<!DOCTYPE html>
<!--
  MA-4513 — Custom Web Receiver.

  M1: plays the workout HLS (useShakaForHls = true — robust HLS, same as Harna).
  M3a: minimal overlay (title + timer) from the phone's reboot channel.
  M3b: FULL custom side-panel layout (no built-in <cast-media-player> chrome — own
       <video class="castMediaElement"> per the Cast "Custom UI data binding" path). Vertical 9:16
       video is centred/pillarboxed with a static frosted-dark ambient on the sides; exercise name +
       "N of M" + "next up" sit LEFT of the video, the timer + countdown ring sit RIGHT, a segmented
       progress bar (one segment per exercise, mirrored from the phone) runs along the bottom. The
       3·2·1 countdown animates locally off the isCountdown flag; intro/outro/completion show
       "continue on your phone" cards. Clean dark POC look + Reboot orange accent.
       Later: ambient colour sampled from the video; cover image / exercise thumbnails.

  Channel (phone → TV): urn:x-cast:com.amomedia.musclemate.reboot, payload = CastOverlayMessage.
  Deploy: GitHub Pages → registered Custom Receiver 95AE9DBA; end+restart the cast session to refresh.
-->
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MadMuscles Reboot Receiver</title>
    <style>
        :root {
            --accent: #ff6a00;
            --text: #f3f4f7;
            --dim: rgba(243,244,247,0.6);
            --faint: rgba(243,244,247,0.32);
            --gap: 1.6vh;        /* offset of the progress bar from the top screen edge */
            --video-gap: 4vh;    /* double gap above the video — clears the top progress bar; single 2vh below */
            /* Frosted-glass ambient (blurred workout cover behind the video). */
            --ambient-blur: 60px;             /* blur radius of the cover */
            --ambient-scale: 1.2;             /* overscan so blurred edges never show */
            --frost: rgba(8, 9, 12, 0.58);    /* DARK frost (keeps white/orange UI legible). White-glass alt: rgba(255,255,255,0.10) */
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; height: 100%; overflow: hidden;
            background: #000; color: var(--text);
            font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
        }

        /* Frosted-glass ambient: blurred workout cover (set from load customData.cover) with a fallback
           gradient, overscaled so the blur's soft edges never reach the screen border. The #frost layer
           on top darkens it (or tints it white) so the white/orange UI stays legible. Both sit behind
           #stage. CSS filter only paints — it never reads pixels — so no canvas/CORS taint. */
        #ambient {
            position: absolute; inset: 0; z-index: 0;
            background: radial-gradient(120% 95% at 50% 28%, #2c323f 0%, #14161d 56%, #000 100%);
            background-size: cover; background-position: center;
            filter: blur(var(--ambient-blur)) saturate(1.15);
            transform: scale(var(--ambient-scale));
            transition: opacity 600ms ease;
        }
        #frost { position: absolute; inset: 0; z-index: 1; background: var(--frost); }

        /* Side panels + video layer, above the ambient. */
        #stage {
            position: absolute; inset: 0; z-index: 2;
            display: grid;
            grid-template-columns: 1fr minmax(0, auto) 1fr;
            align-items: center;                     /* centers the side panels vertically */
            padding: 0 4.5%;                         /* horizontal only → video flush to the top */
            background: transparent;                 /* the #ambient layer is the background now */
        }
        /* Kill the native video controls bar that the platform flashes on pause/unpause. */
        #video::-webkit-media-controls,
        #video::-webkit-media-controls-enclosure,
        #video::-webkit-media-controls-panel { display: none !important; -webkit-appearance: none !important; }
        #video {
            grid-column: 2; justify-self: center; align-self: start;
            margin-top: var(--video-gap);   /* double gap on top (room for the top progress bar) */
            /* Explicit vh height + aspect-ratio is the combo that actually RENDERS on the dongle.
               (height:100% of a grid track, or width:auto without an aspect, left the video black.)
               4vh top + 94vh height = 98vh, leaving a single 2vh gap at the bottom. */
            height: 94vh; aspect-ratio: 9 / 16; max-width: 100%;
            background: #000; border-radius: 10px;
            box-shadow: 0 10px 44px -10px rgba(0,0,0,0.75);
            transition: opacity 320ms ease, transform 320ms ease;
        }
        .screen[data-phase="exerciseRest"] #video { opacity: 0.4; transform: scale(0.92); }

        /* Side panels */
        .panel { grid-row: 1; align-self: center; min-width: 0; }
        .panel.left { grid-column: 1; padding-right: 3%; }
        .panel.right { grid-column: 3; padding-left: 3%; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .eyebrow {
            margin: 0 0 1.2vh; font-size: clamp(11px, 1.5vw, 15px); font-weight: 700;
            letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent);
        }
        .left .title { margin: 0; font-size: clamp(20px, 3.6vw, 40px); font-weight: 800; line-height: 1.08; letter-spacing: -0.015em; }
        .left .sub { margin: 1.6vh 0 0; font-size: clamp(13px, 1.7vw, 18px); color: var(--dim); }
        .right .eyebrow { color: var(--dim); }

        /* Timer + ring */
        .timer { position: relative; width: clamp(110px, 18vw, 200px); aspect-ratio: 1; display: grid; place-items: center; }
        .timer svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
        .timer .track { fill: none; stroke: rgba(255,255,255,0.14); stroke-width: 6; }
        .timer .fill {
            fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round;
            stroke-dasharray: 289; stroke-dashoffset: 0; transition: stroke-dashoffset 950ms linear;
        }
        .timer .value { font-size: clamp(28px, 5vw, 54px); font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
        .timer .value.label { font-size: clamp(20px, 3vw, 34px); font-weight: 700; letter-spacing: 0.04em; }
        .timer.no-ring svg { display: none; }
        .right.hide-timer .timer { display: none; }

        /* Segmented progress */
        #progress { position: absolute; left: 4.5%; right: 4.5%; top: var(--gap); display: flex; gap: 5px; }
        .seg { flex: 1; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.16); overflow: hidden; }
        .seg i { display: block; height: 100%; width: 0; background: var(--accent); border-radius: 999px; transition: width 320ms ease; }

        /* Top-left workout chip */
        #chip {
            position: absolute; top: 4.4%; left: 4.6%; display: inline-flex; align-items: center; gap: 9px;
            font-size: clamp(12px, 1.5vw, 16px); color: var(--dim); letter-spacing: 0.02em;
        }
        #chip::before { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px rgba(255,106,0,0.18); }

        /* Overlays: countdown + cards */
        #countdown, #card {
            position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
            gap: 1.6vh; background: rgba(8,9,12,0.66); backdrop-filter: blur(3px); text-align: center;
        }
        #countdown.show, #card.show { display: flex; }
        #cdNum { font-size: clamp(96px, 20vw, 220px); font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
        #cdLabel, #cardLabel { font-size: clamp(13px, 1.8vw, 18px); letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); }
        #cardTitle { margin: 0; font-size: clamp(26px, 4.6vw, 50px); font-weight: 800; }
        #cardHint {
            margin-top: 1vh; display: inline-flex; align-items: center; gap: 12px;
            border: 1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.05);
            padding: 1.4vh 2.4vw; border-radius: 999px; font-size: clamp(14px, 1.8vw, 19px); font-weight: 600;
        }
        #cardHint .glyph { width: 20px; height: 30px; border: 2px solid var(--accent); border-radius: 5px; position: relative; flex: none; }
        #cardHint .glyph::after { content:""; position:absolute; left:50%; bottom:3px; width:7px; height:2px; transform:translateX(-50%); background:var(--accent); border-radius:2px; }
        #cardHint.hide { display: none; }

        #idle { position: absolute; inset: 0; z-index: 3; display: flex; align-items: center; justify-content: center; color: var(--faint); font-size: 3vh; letter-spacing: 0.05em; }
        #idle.hidden { display: none; }

        @media (prefers-reduced-motion: no-preference) {
            #countdown.show #cdNum { animation: pop 1s ease-in-out infinite; }
        }
        @keyframes pop { 0%,100% { transform: scale(1); opacity: 0.95; } 50% { transform: scale(1.08); opacity: 1; } }

        /* Buffering spinner — shown while the video (re)buffers so the TV isn't a frozen/black frame. */
        #spinner {
            position: absolute; left: 50%; top: 50%; width: 64px; height: 64px;
            margin: -32px 0 0 -32px; box-sizing: border-box;
            border: 4px solid rgba(255,255,255,0.16); border-top-color: var(--accent);
            border-radius: 50%; display: none; z-index: 5;
        }
        #spinner.show { display: block; }
        @media (prefers-reduced-motion: no-preference) {
            #spinner.show { animation: spin 0.85s linear infinite; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TEMP debug readout of the last overlay payload (remove once the timer issue is diagnosed). */
        #debug { position: absolute; left: 8px; bottom: 8px; z-index: 9; font: 12px/1.3 monospace; color: rgba(255,255,255,0.4); pointer-events: none; }
    </style>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
</head>
<body>
    <div id="ambient"></div>
    <div id="frost"></div>

    <div id="stage" class="screen">
        <video id="video" class="castMediaElement" playsinline></video>

        <div class="panel left">
            <p class="eyebrow" id="leftEyebrow"></p>
            <h2 class="title" id="leftTitle"></h2>
            <p class="sub" id="leftSub"></p>
        </div>

        <div class="panel right" id="rightPanel">
            <div class="timer">
                <svg viewBox="0 0 100 100" aria-hidden="true">
                    <circle class="track" cx="50" cy="50" r="46"></circle>
                    <circle class="fill" id="ring" cx="50" cy="50" r="46"></circle>
                </svg>
                <div class="value" id="timerValue"></div>
            </div>
        </div>

        <div id="chip"></div>
        <div id="progress"></div>

        <div id="countdown">
            <div id="cdNum">3</div>
            <div id="cdLabel">Get ready</div>
        </div>

        <div id="card">
            <div id="cardLabel"></div>
            <h1 id="cardTitle"></h1>
            <div id="cardHint"><span class="glyph"></span><span id="cardHintText"></span></div>
        </div>
    </div>

    <div id="idle">MadMuscles</div>
    <div id="spinner"></div>
    <div id="debug"></div>

    <script>
        const NAMESPACE = 'urn:x-cast:com.amomedia.musclemate.reboot';
        const RING_C = 2 * Math.PI * 46;

        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const castDebugLogger = cast.debug.CastDebugLogger.getInstance();
        context.setLoggerLevel(cast.framework.LoggerLevel.DEBUG);

        const el = (id) => document.getElementById(id);
        const screenEl = el('stage');
        const chipEl = el('chip'), idleEl = el('idle'), progressEl = el('progress');
        const leftEyebrow = el('leftEyebrow'), leftTitle = el('leftTitle'), leftSub = el('leftSub');
        const rightPanel = el('rightPanel'), timerValue = el('timerValue'), ring = el('ring');
        const timerEl = document.querySelector('.timer');
        const countdownEl = el('countdown'), cdNum = el('cdNum');
        const cardEl = el('card'), cardLabel = el('cardLabel'), cardTitle = el('cardTitle'), cardHint = el('cardHint'), cardHintText = el('cardHintText');

        ring.style.strokeDasharray = RING_C.toFixed(1);

        function renderSegments(arr) {
            if (progressEl.children.length !== arr.length) {
                progressEl.innerHTML = '';
                arr.forEach(() => { const s = document.createElement('div'); s.className = 'seg'; s.innerHTML = '<i></i>'; progressEl.appendChild(s); });
            }
            [...progressEl.children].forEach((seg, i) => {
                seg.querySelector('i').style.width = Math.round((arr[i] || 0) * 100) + '%';
            });
        }

        function parseTimerSec(t) {
            if (!t) return 0;
            const parts = t.split(':');
            return (parseInt(parts[0], 10) || 0) * 60 + (parseInt(parts[1], 10) || 0);
        }

        function setTimerRing(d) {
            timerValue.textContent = d.timer || '';
            const total = d.timerTotalSec || 0;
            const frac = total > 0 ? Math.max(0, Math.min(1, parseTimerSec(d.timer) / total)) : 1;
            ring.style.strokeDashoffset = (RING_C * (1 - frac)).toFixed(1);
        }

        // local 3·2·1 loop while the phone reports a countdown
        let cdTimer = null;
        function runCountdown(on) {
            if (on && cdTimer === null) {
                let n = 3; cdNum.textContent = n;
                // Count 3 → 2 → 1 once and hold at 1 until the phone clears the countdown — don't loop.
                cdTimer = setInterval(() => { if (n > 1) { n--; cdNum.textContent = n; } }, 1000);
            } else if (!on && cdTimer !== null) {
                clearInterval(cdTimer); cdTimer = null;
            }
        }

        function renderPanels(d) {
            let eyebrow = '', title = '', sub = '';
            let rightMode = 'hidden', rightLabel = '';
            const num = (d.exerciseNumber && d.exerciseCount) ? 'Exercise ' + d.exerciseNumber + ' of ' + d.exerciseCount : '';
            switch (d.phase) {
                case 'exerciseActive':
                    eyebrow = num; title = d.title || ''; sub = d.nextTitle ? 'Next up · ' + d.nextTitle : ''; rightMode = 'timer'; break;
                case 'exercisePreview':
                    eyebrow = 'Up next'; title = d.title || ''; break;
                case 'exerciseRest':
                    eyebrow = 'Rest · next up'; title = d.nextTitle || d.title || ''; sub = 'Catch your breath'; rightMode = 'timer'; break;
                case 'intro':
                    // Keep the intro VIDEO visible — show the prompt beside it, not over it.
                    eyebrow = 'Get started'; title = d.workoutTitle || 'Workout'; sub = 'Press Start on your phone';
                    rightMode = 'label'; rightLabel = 'Intro'; break;
                case 'outro':
                    eyebrow = 'Almost done'; title = d.workoutTitle || ''; sub = 'Tap Complete on your phone';
                    rightMode = 'label'; rightLabel = 'Outro'; break;
                default:
                    break; // completed renders as a card overlay
            }
            leftEyebrow.textContent = eyebrow;
            leftTitle.textContent = title;
            leftSub.textContent = sub;
            applyRight(rightMode, rightLabel, d);
        }

        // Right panel: 'timer' = ring + mm:ss, 'label' = a word (Intro/Outro) with no ring, 'hidden' = nothing.
        function applyRight(mode, label, d) {
            if (mode === 'hidden') { rightPanel.classList.add('hide-timer'); return; }
            rightPanel.classList.remove('hide-timer');
            if (mode === 'timer') {
                timerEl.classList.remove('no-ring');
                timerValue.classList.remove('label');
                setTimerRing(d);
            } else {
                timerEl.classList.add('no-ring');
                timerValue.classList.add('label');
                timerValue.textContent = label;
            }
        }

        function renderCard(d) {
            let label = '', title = '', hint = '';
            switch (d.phase) {
                case 'intro': label = 'Get started'; title = d.workoutTitle || 'Workout'; hint = 'Press Start on your phone'; break;
                case 'outro': label = 'Almost done'; title = d.workoutTitle || ''; hint = 'Tap Complete on your phone'; break;
                case 'completed': label = 'Workout complete'; title = 'Nice work 💪'; hint = ''; break;
            }
            cardLabel.textContent = label;
            cardTitle.textContent = title;
            cardHintText.textContent = hint;
            cardHint.classList.toggle('hide', !hint);
        }

        function applyOverlay(d) {
            if (!d || d.type !== 'overlay') return;
            idleEl.classList.add('hidden');
            screenEl.dataset.phase = d.phase;
            chipEl.textContent = d.workoutTitle || '';
            renderSegments(d.segments || []);

            const counting = !!d.isCountdown;
            countdownEl.classList.toggle('show', counting);
            runCountdown(counting);

            // Only the completion screen takes over the TV; intro/outro keep the video visible and
            // show their prompt in the side panel.
            const isCard = (d.phase === 'completed');
            cardEl.classList.toggle('show', isCard && !counting);

            renderPanels(d);
            if (isCard) renderCard(d);

            // TEMP: surface the live payload so we can see why the timer/countdown isn't rendering.
            el('debug').textContent = (d.phase || '-') + '   t=' + (d.timer || '-') + '   cd=' + (d.isCountdown ? 1 : 0);
        }

        // Audio rendition (language + music/voice) the phone wants on the TV. Stored so a switch
        // requested before Shaka has parsed the manifest is applied once PLAYER_LOAD_COMPLETE fires.
        let desiredAudioLabel = null;
        function applyAudioLabel(label) {
            if (!label) return;
            desiredAudioLabel = label;
            const shaka = playerManager.getShakaPlayer && playerManager.getShakaPlayer();
            if (!shaka) return;   // not ready yet — PLAYER_LOAD_COMPLETE retries with desiredAudioLabel
            try {
                // Shaka matches the HLS rendition by its NAME/label; clearBuffer=true swaps instantly.
                shaka.selectVariantsByLabel(label, true);
                // Fallback for manifests that surface the rendition NAME as originalAudioId, not label.
                const tracks = shaka.getVariantTracks();
                if (!tracks.some(t => t.label === label && t.active)) {
                    const byId = tracks.find(t => t.originalAudioId === label);
                    if (byId) shaka.selectVariantTrack(byId, true);
                }
            } catch (e) {
                castDebugLogger.warn('Reboot', 'audio switch failed for "' + label + '": ' + e);
            }
        }

        context.addCustomMessageListener(NAMESPACE, (event) => {
            let data = event.data;
            if (typeof data === 'string') {
                try { data = JSON.parse(data); } catch (e) { castDebugLogger.warn('Reboot', 'bad msg: ' + event.data); return; }
            }
            if (data && data.type === 'audioTrack') { applyAudioLabel(data.audio); return; }
            applyOverlay(data);
        });

        // Buffering spinner. The single honest signal for "is the video actually playing" is whether
        // currentTime is advancing — both PLAYER_LOAD_COMPLETE and the HTML5 `playing` event fire when
        // the FIRST frame is presented while Shaka is still buffering segments (so they hid the spinner
        // seconds too early). Instead a 250 ms watchdog hides the spinner only once time really advances
        // and re-shows it whenever playback stalls — never while the video is intentionally paused
        // (e.g. the 3·2·1 countdown), so the countdown card isn't covered by a spinner.
        const spinnerEl = el('spinner');
        const videoEl = el('video');
        const setBuffering = (on) => spinnerEl.classList.toggle('show', !!on);
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOADING, () => setBuffering(true));
        playerManager.addEventListener(cast.framework.events.EventType.BUFFERING, (event) => { if (event.isBuffering) setBuffering(true); });
        videoEl.addEventListener('waiting', () => setBuffering(true));
        videoEl.addEventListener('seeking', () => { setBuffering(true); lastPos = -1; });

        let lastPos = -1, lastAdvanceAt = 0;
        setInterval(() => {
            if (videoEl.paused || videoEl.ended || videoEl.readyState < 1) return;
            const now = Date.now();
            if (videoEl.currentTime > lastPos + 0.05) {
                lastPos = videoEl.currentTime;
                lastAdvanceAt = now;
                setBuffering(false);            // time is moving → really playing
            } else if (now - lastAdvanceAt > 500) {
                setBuffering(true);             // stalled while trying to play → buffering
            }
        }, 250);

        // Blurred workout cover as the frosted-glass ambient. CSS background-image only displays the
        // image (no canvas read), so the cross-origin CDN URL needs no CORS headers.
        const ambientEl = el('ambient');
        function applyCover(url) {
            if (!url) return;
            ambientEl.style.backgroundImage = "url('" + url.replace(/'/g, "%27") + "')";
        }

        // Apply the phone's audio rendition + cover once Shaka has the manifest: prefer a label already
        // requested over the channel, else the one passed in load customData.
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
            const info = playerManager.getMediaInformation && playerManager.getMediaInformation();
            const customData = (info && info.customData) || {};
            applyAudioLabel(desiredAudioLabel || customData.audio);
            applyCover(customData.cover);
        });

        playerManager.addEventListener(cast.framework.events.EventType.ERROR, (event) => {
            castDebugLogger.error('Reboot', 'player error: ' + JSON.stringify(event));
        });

        const options = new cast.framework.CastReceiverOptions();
        options.useShakaForHls = true;
        context.start(options);
    </script>
</body>
</html>
