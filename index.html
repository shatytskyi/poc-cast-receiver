<!DOCTYPE html>
<!--
  MA-4513 — Custom Web Receiver.

  M1: plays the workout HLS (useShakaForHls = true — robust HLS, same as Harna).
  M3a: minimal overlay (title + timer) from the phone's reboot channel.
  M3b: FULL custom side-panel layout (no built-in <cast-media-player> chrome — own
       <video class="castMediaElement"> per the Cast "Custom UI data binding" path). Vertical 9:16
       video is centred/pillarboxed over a blurred workout-cover frosted-glass ambient; exercise name +
       "N of M" + "next up" sit LEFT of the video, the timer + ring sit RIGHT, a segmented
       progress bar runs along the top; intro/outro show a right-panel "tap X on your phone" CTA.
  Design: skinned to the app's REAL Reboot design system — accent #FF4400 (orange50), Inter for text +
       IBM Plex Sans for the big timer digits (the actual app TTFs, served beside this file), white-on-grey
       progress bar, 16px-radius chips/cards, primary-button styling for the CTA. (RebootTheme* tokens.)
  Completion: the full-screen "Workout complete" card shows when the OUTRO VIDEO FULLY ENDS (the phone
       pauses at the very end) — detected receiver-side via the `ended` event / currentTime≈duration.
       While the outro is still playing it stays a right-panel "Complete" prompt. (The 3·2·1 countdown is
       intentionally NOT mirrored — still plays on the phone.)

  Channel (phone → TV): urn:x-cast:com.amomedia.musclemate.reboot, payload = CastOverlayMessage.
  Deploy: GitHub Pages → registered Custom Receiver 95AE9DBA; end+restart the cast session to refresh.
-->
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MadMuscles Reboot Receiver</title>
    <style>
        /* Real Reboot fonts (the exact app TTFs, served from this repo next to index.html). Inter for all
           text; IBM Plex Sans for the large timer digits (RebootThemeTypography.digitsLargeBold). */
        @font-face {
            font-family: 'InterReboot'; font-weight: 100 900; font-style: normal; font-display: swap;
            src: url('inter_variable.ttf') format('truetype');
        }
        @font-face {
            font-family: 'PlexReboot'; font-weight: 100 900; font-style: normal; font-display: swap;
            src: url('ibm_plex_sans_variable.ttf') format('truetype');
        }

        :root {
            /* Reboot semantic tokens (dark) — RebootThemeColors.kt */
            --accent: #FF4400;             /* orange50 — the real Reboot accent */
            --text: #FFFFFF;               /* textPrimary */
            --text-secondary: #B3B3B3;     /* grey70 / textSecondary */
            --text-tertiary: #808080;      /* grey50 / textTertiary */
            --dim: #B3B3B3;                /* alias → textSecondary */
            --faint: #808080;              /* idle text → textTertiary */
            --on-light-strong: rgba(18,18,18,0.40);   /* overlayOnLightStrong — chip/button bg over video */
            --on-light-heavy: rgba(18,18,18,0.60);    /* overlayOnLightHeavy — completion card scrim */
            --on-dark-subtle: rgba(255,255,255,0.12); /* overlayOnDarkSubtle */
            --on-dark-soft: rgba(255,255,255,0.16);   /* overlayOnDarkSoft */
            --r-l: 16px;                   /* shapes.large */
            --font-ui: 'InterReboot', -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
            --font-digits: 'PlexReboot', 'InterReboot', system-ui, sans-serif;
            --gap: 1.6vh;        /* offset of the progress bar from the top screen edge */
            --video-gap: 4vh;    /* double gap above the video — clears the top progress bar; single 2vh below */
            /* Frosted-glass ambient (blurred workout cover behind the video). */
            --ambient-blur: 60px;             /* blur radius of the cover */
            --ambient-scale: 1.2;             /* overscan so blurred edges never show */
            --frost: rgba(18, 19, 20, 0.46);  /* neutral-black frost over the cover (Reboot neutrals) */
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none;
            background: #121212; color: var(--text);     /* surfaceTertiary */
            font-family: var(--font-ui);
            -webkit-font-smoothing: antialiased;
        }

        /* Frosted-glass ambient: blurred workout cover (set from load customData.cover) with a fallback
           gradient, overscaled so the blur's soft edges never reach the screen border. The #frost layer
           on top darkens it so the white/orange UI stays legible. Both sit behind #stage. CSS filter only
           paints — it never reads pixels — so no canvas/CORS taint.
           Layers stack on LOW POSITIVE z-index (below the player UI, above the body box background). They
           must NOT be negative: html+body carry a background, so body's box paints over any negative-z
           layer and the cover/gradient turns solid black. The OS system overlay is drawn above the WebView,
           so page z-index can't affect it (the real overlay-stability fix is position:fixed). */
        #ambient {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(120% 95% at 50% 28%, #2A2A2A 0%, #1E1E1E 56%, #121212 100%);
        }
        /* The blurred cover sits on its own layer above the gradient and fades in (opacity 0 → 1) once
           the image has loaded, so it never pops in instantly. */
        #cover {
            position: fixed; inset: 0; z-index: 2;
            background-size: cover; background-position: center;
            filter: blur(var(--ambient-blur)) saturate(1.15);
            transform: scale(var(--ambient-scale));
            opacity: 0; transition: opacity 3000ms ease;
        }
        #frost { position: fixed; inset: 0; z-index: 3; background: var(--frost); }

        /* Side panels + video layer, above the ambient/frost layers. */
        #stage {
            position: fixed; inset: 0; z-index: 4;
            display: grid;
            grid-template-columns: 1fr minmax(0, auto) 1fr;
            align-items: center;                     /* centers the side panels vertically */
            padding: 0 4.5%;                         /* horizontal only → video flush to the top */
            background: transparent;                 /* the #ambient layer is the background now */
        }
        /* Kill the native video controls bar that the platform flashes on pause/unpause. */
        #video::-webkit-media-controls,
        #video::-webkit-media-controls-enclosure,
        #video::-webkit-media-controls-panel { display: none !important; -webkit-appearance: none !important; }
        #video {
            grid-column: 2; justify-self: center; align-self: start;
            margin-top: var(--video-gap);   /* double gap on top (room for the top progress bar) */
            /* Explicit vh height + aspect-ratio is the combo that actually RENDERS on the dongle.
               (height:100% of a grid track, or width:auto without an aspect, left the video black.)
               4vh top + 94vh height = 98vh, leaving a single 2vh gap at the bottom. */
            height: 94vh; aspect-ratio: 9 / 16; max-width: 100%;
            background: #000; border-radius: 10px;
            box-shadow: 0 10px 44px -10px rgba(0,0,0,0.75);
        }

        /* Side panels */
        .panel { grid-row: 1; align-self: center; min-width: 0; }
        .panel.left { grid-column: 1; padding-right: 3%; }
        .panel.right { grid-column: 3; padding-left: 3%; display: flex; flex-direction: column; align-items: center; text-align: center; }
        /* Eyebrow = Reboot section-header style (bodySBold, uppercase, textSecondary). */
        .eyebrow {
            margin: 0 0 1.2vh; font-size: clamp(11px, 1.5vw, 15px); font-weight: 700;
            letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-secondary);
        }
        .eyebrow:empty { display: none; }   /* no empty-label gap (e.g. the Rest phase has no eyebrow) */
        /* Title = titleXl (700, -0.02em). */
        .left .title { margin: 0; font-size: clamp(20px, 3.6vw, 40px); font-weight: 700; line-height: 1.08; letter-spacing: -0.02em; }
        .left .sub { margin: 1.6vh 0 0; font-size: clamp(13px, 1.7vw, 18px); color: var(--text-secondary); }
        .left .sub b { color: var(--text); font-weight: 600; }

        /* Timer + ring. Digits use IBM Plex Sans (digitsLargeBold), ring uses the accent. */
        .timer { position: relative; width: clamp(110px, 18vw, 200px); aspect-ratio: 1; display: grid; place-items: center; }
        .timer svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
        .timer .track { fill: none; stroke: var(--on-dark-soft); stroke-width: 6; }
        .timer .fill {
            fill: none; stroke: var(--text); stroke-width: 6; stroke-linecap: round;
            stroke-dashoffset: 0; transition: stroke-dashoffset 950ms linear;
        }
        .timer .value { font-family: var(--font-digits); font-size: clamp(30px, 5.2vw, 58px); font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; line-height: 1; }
        .timer .value.label { font-family: var(--font-ui); font-size: clamp(20px, 3vw, 34px); font-weight: 700; letter-spacing: 0.02em; }
        .timer.no-ring svg { display: none; }
        .right.hide-timer .timer { display: none; }

        /* Right-panel action prompt (intro → Start workout, outro → Complete): mirrors the phone's
           primaryLarge button (accent fill, white labelLarge, radius-large, trailing arrow) + a quiet
           "tap on your phone" hint with a phone glyph. Shown in place of the timer. */
        #rightPrompt { display: none; flex-direction: column; align-items: center; gap: 1.8vh; max-width: 26vw; }
        .right.show-prompt .timer { display: none; }
        .right.show-prompt #rightPrompt { display: flex; }
        .cta {
            display: inline-flex; align-items: center; gap: 10px; min-height: 48px; padding: 1.3vh 3vh;
            background: var(--accent); color: var(--text); border-radius: var(--r-l);
            font-size: clamp(16px, 2vw, 22px); font-weight: 600; letter-spacing: -0.01em; white-space: nowrap;
        }
        .cta .arrow { width: 20px; height: 20px; position: relative; flex: none; }
        .cta .arrow::before { content: ""; position: absolute; top: 50%; left: 1px; width: 14px; height: 2px; background: currentColor; transform: translateY(-50%); }
        .cta .arrow::after { content: ""; position: absolute; top: 50%; right: 1px; width: 9px; height: 9px; border-top: 2px solid currentColor; border-right: 2px solid currentColor; transform: translateY(-50%) rotate(45deg); }
        .cta-hint { display: inline-flex; align-items: center; gap: 9px; font-size: clamp(13px, 1.6vw, 18px); color: var(--text-secondary); }
        .prompt-glyph { width: 22px; height: 33px; border: 2px solid var(--text-secondary); border-radius: 5px; position: relative; flex: none; }
        .prompt-glyph::after { content: ""; position: absolute; left: 50%; bottom: 4px; width: 8px; height: 2px; transform: translateX(-50%); background: var(--text-secondary); border-radius: 2px; }

        /* Segmented progress — Reboot PlayerProgressBar: track = textSecondary (grey70), fill = WHITE
           (textPrimary), h6 r3; intro/outro are fixed-width "bookends", exercises flex between them. */
        #progress { position: absolute; left: 4.5%; right: 4.5%; top: var(--gap); display: flex; align-items: center; gap: 6px; }
        .seg { flex: 1; height: 6px; border-radius: 3px; background: var(--text-secondary); overflow: hidden; }
        .seg.bookend { flex: 0 0 5.5%; }
        .seg.bookend:first-child { margin-right: 6px; }
        .seg.bookend:last-child { margin-left: 6px; }
        .seg i { display: block; height: 100%; width: 0; background: var(--text); border-radius: 3px; transition: width 320ms ease; }

        /* Top-left workout chip — Reboot rounded chip (radius-large, on-light-strong bg) + accent dot. */
        #chip {
            position: absolute; top: 4.4%; left: 4.6%; display: inline-flex; align-items: center; gap: 9px;
            font-size: clamp(12px, 1.5vw, 16px); color: var(--text-secondary); font-weight: 600;
            background: var(--on-light-strong); border-radius: var(--r-l); padding: 0.9vh 1.4vw;
        }
        #chip:empty { display: none; }
        #chip::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex: none; }

        /* Full-screen completion card — shown when the outro VIDEO fully ends (not on a phase flag). */
        #card {
            position: absolute; inset: 0; z-index: 7; display: none; flex-direction: column; align-items: center; justify-content: center;
            gap: 1.6vh; background: var(--on-light-heavy); text-align: center;
        }
        #card.show { display: flex; }
        #cardLabel { font-size: clamp(13px, 1.8vw, 18px); letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
        #cardTitle { margin: 0; font-size: clamp(26px, 4.6vw, 50px); font-weight: 700; letter-spacing: -0.02em; }
        #cardHint {
            margin-top: 1vh; display: inline-flex; align-items: center; gap: 12px;
            border: 1px solid var(--on-dark-soft); background: var(--on-dark-subtle);
            padding: 1.4vh 2.4vw; border-radius: 999px; font-size: clamp(14px, 1.8vw, 19px); font-weight: 600; color: var(--text);
        }
        #cardHint .glyph { width: 20px; height: 30px; border: 2px solid var(--text-secondary); border-radius: 5px; position: relative; flex: none; }
        #cardHint .glyph::after { content:""; position:absolute; left:50%; bottom:3px; width:7px; height:2px; transform:translateX(-50%); background:var(--text-secondary); border-radius:2px; }
        #cardHint.hide { display: none; }

        #idle { position: fixed; inset: 0; z-index: 5; display: flex; align-items: center; justify-content: center; color: var(--faint); font-size: 3vh; letter-spacing: 0.05em; }
        #idle.hidden { display: none; }

        /* Buffering spinner — shown while the video (re)buffers so the TV isn't a frozen/black frame. */
        #spinner {
            position: fixed; left: 50%; top: 50%; width: 64px; height: 64px;
            margin: -32px 0 0 -32px; box-sizing: border-box;
            border: 4px solid var(--on-dark-soft); border-top-color: var(--text);
            border-radius: 50%; display: none; z-index: 6;
        }
        #spinner.show { display: block; }
        @media (prefers-reduced-motion: no-preference) {
            #spinner.show { animation: spin 0.85s linear infinite; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TEMP diagnostic (MA-4513 error-905 probe): surfaces the player ERROR code + Shaka detail on
           screen to confirm the CORS fix (§5). Hidden by default — flip to display:block when debugging
           the CDN CORS issue. */
        #diag { display: none; position: fixed; left: 10px; bottom: 10px; z-index: 9; max-width: 60vw; font: 13px/1.35 monospace; color: rgba(255,170,150,0.9); pointer-events: none; white-space: pre-wrap; }

        /* Receiver build version — bumped on every deploy so we can confirm what's actually running. */
        #version { position: fixed; right: 10px; bottom: 10px; z-index: 9; font: 11px monospace; color: rgba(255,255,255,0.3); pointer-events: none; }
    </style>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
</head>
<body>
    <div id="ambient"></div>
    <div id="cover"></div>
    <div id="frost"></div>

    <div id="stage" class="screen">
        <video id="video" class="castMediaElement"></video>

        <div class="panel left">
            <p class="eyebrow" id="leftEyebrow"></p>
            <h2 class="title" id="leftTitle"></h2>
            <p class="sub" id="leftSub"></p>
        </div>

        <div class="panel right" id="rightPanel">
            <div class="timer">
                <svg viewBox="0 0 100 100" aria-hidden="true">
                    <circle class="track" cx="50" cy="50" r="46"></circle>
                    <circle class="fill" id="ring" cx="50" cy="50" r="46"></circle>
                </svg>
                <div class="value" id="timerValue"></div>
            </div>
            <div id="rightPrompt">
                <div class="cta"><span id="promptBtn"></span><span class="arrow"></span></div>
                <div class="cta-hint"><span class="prompt-glyph"></span><span>Tap on your phone</span></div>
            </div>
        </div>

        <div id="chip"></div>
        <div id="progress"></div>

        <div id="card">
            <div id="cardLabel"></div>
            <h1 id="cardTitle"></h1>
            <div id="cardHint"><span class="glyph"></span><span id="cardHintText"></span></div>
        </div>
    </div>

    <div id="idle">MadMuscles</div>
    <div id="spinner"></div>
    <div id="diag"></div>
    <div id="version">v0.0.15</div>

    <script>
        const NAMESPACE = 'urn:x-cast:com.amomedia.musclemate.reboot';
        const RING_C = 2 * Math.PI * 46;

        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const castDebugLogger = cast.debug.CastDebugLogger.getInstance();
        context.setLoggerLevel(cast.framework.LoggerLevel.DEBUG);

        const el = (id) => document.getElementById(id);
        const screenEl = el('stage');
        const chipEl = el('chip'), idleEl = el('idle'), progressEl = el('progress');
        const leftEyebrow = el('leftEyebrow'), leftTitle = el('leftTitle'), leftSub = el('leftSub');
        const rightPanel = el('rightPanel'), timerValue = el('timerValue'), ring = el('ring');
        const timerEl = document.querySelector('.timer');
        const promptBtnEl = el('promptBtn');
        const cardEl = el('card'), cardLabel = el('cardLabel'), cardTitle = el('cardTitle'), cardHint = el('cardHint'), cardHintText = el('cardHintText');

        ring.style.strokeDasharray = RING_C.toFixed(1);

        // TEMP (MA-4513 error-905 probe): an on-screen APPEND log of the media-load lifecycle, each line
        // timestamped (ms since the receiver booted). Records every incoming LOAD/STOP/SEEK transport
        // command (via the interceptors below) plus loading / loaded / error events. Remove once the CDN
        // CORS issue is fixed and casting is confirmed.
        const diagEl = el('diag');
        const diagLines = [];
        const nowMs = () => (typeof performance !== 'undefined' && performance.now) ? performance.now() : 0;
        const t0 = nowMs();
        function diag(line) {
            diagLines.push('+' + Math.round(nowMs() - t0) + 'ms ' + line);
            while (diagLines.length > 14) diagLines.shift();
            diagEl.textContent = diagLines.join('\n');
        }

        // Segments = [introProgress, ...exerciseProgresses, outroProgress]; first + last render as
        // fixed-width bookends (intro/outro), the middle exercises flex between them (Reboot progress bar).
        function renderSegments(arr) {
            if (progressEl.children.length !== arr.length) {
                progressEl.innerHTML = '';
                arr.forEach((_, i) => {
                    const s = document.createElement('div');
                    s.className = 'seg' + ((i === 0 || i === arr.length - 1) ? ' bookend' : '');
                    s.innerHTML = '<i></i>';
                    progressEl.appendChild(s);
                });
            }
            [...progressEl.children].forEach((seg, i) => {
                seg.querySelector('i').style.width = Math.round((arr[i] || 0) * 100) + '%';
            });
        }

        function parseTimerSec(t) {
            if (!t) return 0;
            const parts = t.split(':');
            return (parseInt(parts[0], 10) || 0) * 60 + (parseInt(parts[1], 10) || 0);
        }

        function setTimerRing(d) {
            timerValue.textContent = d.timer || '';
            const total = d.timerTotalSec || 0;
            const frac = total > 0 ? Math.max(0, Math.min(1, parseTimerSec(d.timer) / total)) : 1;
            ring.style.strokeDashoffset = (RING_C * (1 - frac)).toFixed(1);
        }

        function renderPanels(d) {
            let eyebrow = '', title = '', sub = '';
            let rightMode = 'hidden', rightLabel = '', promptBtn = '';
            const num = (d.exerciseNumber && d.exerciseCount) ? 'Exercise ' + d.exerciseNumber + ' of ' + d.exerciseCount : '';
            switch (d.phase) {
                case 'exerciseActive':
                    eyebrow = num; title = d.title || ''; sub = d.nextTitle ? 'Next up · ' + d.nextTitle : ''; rightMode = 'timer'; break;
                case 'exercisePreview':
                    eyebrow = 'Up next'; title = d.title || ''; rightMode = 'label'; rightLabel = 'Preview'; break;
                case 'exerciseRest':
                    // Rest: the LEFT shows "Rest" in place of the exercise name; the next exercise drops to
                    // the sub-line. The video frame scales down + dims (the [data-phase="exerciseRest"]
                    // rule), mirroring the phone. Timer (ring + mm:ss) stays on the right.
                    title = 'Rest'; sub = d.nextTitle ? 'Next up · ' + d.nextTitle : 'Catch your breath'; rightMode = 'timer'; break;
                case 'intro':
                    // Intro VIDEO stays visible; the call-to-action is the prominent right-panel prompt,
                    // labelled with the phone's exact button text.
                    eyebrow = 'Get started'; title = d.workoutTitle || 'Workout';
                    rightMode = 'prompt'; promptBtn = 'Start workout'; break;
                case 'outro':
                    eyebrow = 'Almost done'; title = d.workoutTitle || '';
                    rightMode = 'prompt'; promptBtn = 'Complete'; break;
                default:
                    break; // completion is driven by the video ending, not a phase (see updateCard)
            }
            leftEyebrow.textContent = eyebrow;
            leftTitle.textContent = title;
            leftSub.textContent = sub;
            applyRight(rightMode, rightLabel, d, promptBtn);
        }

        // Right panel: 'timer' = ring + mm:ss, 'prompt' = primary-button CTA + "tap on your phone" hint,
        // 'label' = a bare word, 'hidden' = nothing.
        function applyRight(mode, label, d, promptBtn) {
            rightPanel.classList.toggle('show-prompt', mode === 'prompt');
            if (mode === 'prompt') {
                rightPanel.classList.remove('hide-timer');
                promptBtnEl.textContent = promptBtn || '';
                return;
            }
            if (mode === 'hidden') { rightPanel.classList.add('hide-timer'); return; }
            rightPanel.classList.remove('hide-timer');
            if (mode === 'timer') {
                timerEl.classList.remove('no-ring');
                timerValue.classList.remove('label');
                setTimerRing(d);
            } else {
                timerEl.classList.add('no-ring');
                timerValue.classList.add('label');
                timerValue.textContent = label;
            }
        }

        // The full-screen "Workout complete" card shows when the outro VIDEO has fully ended (the phone
        // pauses at the very end), NOT on a phase flag — so while the outro is still playing the TV keeps
        // the video + the right-panel "Complete" prompt, and only flips to the celebration once playback
        // truly finishes. `videoEnded` is driven by the HTML5 `ended` event and the watchdog below.
        let currentPhase = '';
        let videoEnded = false;
        function updateCard() {
            const show = videoEnded || currentPhase === 'completed';
            cardEl.classList.toggle('show', show);
            if (show) {
                cardLabel.textContent = 'Workout complete';
                cardTitle.textContent = 'Nice work 💪';
                cardHintText.textContent = 'Continue on your phone';
                cardHint.classList.remove('hide');
            }
        }

        function applyOverlay(d) {
            if (!d || d.type !== 'overlay') return;
            idleEl.classList.add('hidden');
            currentPhase = d.phase;
            screenEl.dataset.phase = d.phase;
            chipEl.textContent = d.workoutTitle || '';
            renderSegments(d.segments || []);
            renderPanels(d);
            updateCard();
        }

        // Audio rendition (language + music/voice) the phone wants on the TV. Stored so a switch
        // requested before Shaka has parsed the manifest is applied once PLAYER_LOAD_COMPLETE fires.
        let desiredAudioLabel = null;
        function applyAudioLabel(label) {
            if (!label) return;
            desiredAudioLabel = label;
            const shaka = playerManager.getShakaPlayer && playerManager.getShakaPlayer();
            if (!shaka) return;   // not ready yet — PLAYER_LOAD_COMPLETE retries with desiredAudioLabel
            try {
                // Shaka matches the HLS rendition by its NAME/label; clearBuffer=true swaps instantly.
                shaka.selectVariantsByLabel(label, true);
                // Fallback for manifests that surface the rendition NAME as originalAudioId, not label.
                const tracks = shaka.getVariantTracks();
                if (!tracks.some(t => t.label === label && t.active)) {
                    const byId = tracks.find(t => t.originalAudioId === label);
                    if (byId) shaka.selectVariantTrack(byId, true);
                }
            } catch (e) {
                castDebugLogger.warn('Reboot', 'audio switch failed for "' + label + '": ' + e);
            }
        }

        context.addCustomMessageListener(NAMESPACE, (event) => {
            let data = event.data;
            if (typeof data === 'string') {
                try { data = JSON.parse(data); } catch (e) { castDebugLogger.warn('Reboot', 'bad msg: ' + event.data); return; }
            }
            if (data && data.type === 'audioTrack') { applyAudioLabel(data.audio); return; }
            applyOverlay(data);
        });

        // Buffering spinner. The single honest signal for "is the video actually playing" is whether
        // currentTime is advancing — both PLAYER_LOAD_COMPLETE and the HTML5 `playing` event fire when
        // the FIRST frame is presented while Shaka is still buffering segments (so they hid the spinner
        // seconds too early). A 250 ms watchdog hides the spinner only once time really advances and
        // re-shows it whenever playback stalls — never while the video is intentionally paused.
        const spinnerEl = el('spinner');
        const videoEl = el('video');
        // Debounced so rapid seeks (clicking "next" many times fast) don't make the spinner strobe:
        // show immediately, but defer HIDING ~350 ms — a burst of seek/buffer/waiting events keeps
        // cancelling the pending hide, so it stays one steady spinner and only clears once playback
        // actually settles, instead of flickering on/off per event.
        let bufferingHideTimer = null;
        const setBuffering = (on) => {
            if (on) {
                if (bufferingHideTimer) { clearTimeout(bufferingHideTimer); bufferingHideTimer = null; }
                spinnerEl.classList.add('show');
            } else if (!bufferingHideTimer) {
                bufferingHideTimer = setTimeout(() => { spinnerEl.classList.remove('show'); bufferingHideTimer = null; }, 350);
            }
        };
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOADING, () => { setBuffering(true); diag('PLAYER_LOADING'); });
        playerManager.addEventListener(cast.framework.events.EventType.BUFFERING, (event) => { if (event.isBuffering) setBuffering(true); });
        videoEl.addEventListener('waiting', () => setBuffering(true));
        videoEl.addEventListener('seeking', () => { setBuffering(true); lastPos = -1; });
        // Natural end of the outro video → celebration card (the phone is paused at the very end).
        videoEl.addEventListener('ended', () => { videoEnded = true; setBuffering(false); updateCard(); });

        let lastPos = -1, lastAdvanceAt = 0;
        setInterval(() => {
            // Completion detection: the phone pauses at the very end of the outro, which can land just
            // shy of `ended` firing — so also treat "outro + parked within 0.4 s of duration" as ended,
            // and undo it if playback ever moves back from the end.
            const dur = videoEl.duration;
            if (currentPhase === 'outro' && isFinite(dur) && dur > 0) {
                if (videoEl.currentTime >= dur - 0.4) {
                    if (!videoEnded) { videoEnded = true; updateCard(); }
                } else if (videoEnded && videoEl.currentTime < dur - 1) {
                    videoEnded = false; updateCard();
                }
            }

            if (videoEl.paused || videoEl.ended || videoEl.readyState < 1) return;
            const now = Date.now();
            if (videoEl.currentTime > lastPos + 0.05) {
                lastPos = videoEl.currentTime;
                lastAdvanceAt = now;
                setBuffering(false);            // time is moving → really playing
            } else if (now - lastAdvanceAt > 500) {
                setBuffering(true);             // stalled while trying to play → buffering
            }
        }, 250);

        // Blurred workout cover as the frosted-glass ambient. CSS background-image only displays the
        // image (no canvas read), so the cross-origin CDN URL needs no CORS headers.
        const coverEl = el('cover');
        let appliedCoverUrl = null;
        function applyCover(url) {
            // Idempotent: both the LOAD interceptor and PLAYER_LOAD_COMPLETE call this; skip the second.
            if (!url || url === appliedCoverUrl) return;
            appliedCoverUrl = url;
            const safe = url.replace(/'/g, "%27");
            // Preload, then fade in: the CSS background reads the now-cached image and the opacity
            // transition (0 → 1) animates it in instead of popping instantly.
            const pre = new Image();
            pre.onload = () => {
                coverEl.style.backgroundImage = "url('" + safe + "')";
                coverEl.style.opacity = '1';
            };
            pre.src = url;
        }

        // Apply the phone's audio rendition + cover once Shaka has the manifest, and reset the
        // completion state for the freshly-loaded media.
        let hasLoaded = false;   // (kept for the future Back/Home auto-stop guard)
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
            hasLoaded = true;
            videoEnded = false; updateCard();
            // Re-assert skip-next / prev in case the fresh LOAD reset supportedMediaCommands (M4).
            enableRemoteNavCommands();
            const info = playerManager.getMediaInformation && playerManager.getMediaInformation();
            const customData = (info && info.customData) || {};
            applyAudioLabel(desiredAudioLabel || customData.audio);
            applyCover(customData.cover);
            // TEMP (905 probe): show the loaded URL so we can compare a working vs a stuck workout.
            try {
                const src = (info && (info.contentUrl || info.contentId)) || '(no url)';
                diag('LOAD_COMPLETE\n  ' + src);
            } catch (e) {}
        });

        playerManager.addEventListener(cast.framework.events.EventType.ERROR, (event) => {
            castDebugLogger.error('Reboot', 'player error: ' + JSON.stringify(event));
            // TEMP (905 probe): surface the failure with CAF/Shaka detail. 905 = LOAD_INTERRUPTED,
            // 906 = LOAD_FAILED; event.error (Shaka) carries category (1=NETWORK 4=MANIFEST …, incl. CORS
            // as 1002 HTTP_ERROR) + code + data.
            const code = event.detailedErrorCode != null ? event.detailedErrorCode : '?';
            let extra = '';
            try {
                const e = event.error;
                if (e && typeof e === 'object') {
                    const cat = e.category != null ? 'cat=' + e.category + ' ' : '';
                    const ec = e.code != null ? 'shaka=' + e.code + ' ' : '';
                    const data = e.data ? JSON.stringify(e.data).slice(0, 160) : JSON.stringify(e).slice(0, 160);
                    extra = cat + ec + data;
                } else if (event.reason != null) {
                    extra = 'reason=' + event.reason;
                }
            } catch (x) {}
            diag('ERROR code=' + code + (extra ? '\n  ' + extra : ''));
        });

        // TEMP (MA-4513 error-905 probe): the Back/Home auto-stop (visibilitychange / pagehide →
        // context.stop()) is DISABLED while the CDN CORS issue is open. Restore a smarter version
        // (guarded so it can't fire during the initial load) once casting works end to end.
        //
        // let exitStopTimer = null;
        // document.addEventListener('visibilitychange', () => {
        //     if (document.hidden && hasLoaded) {
        //         exitStopTimer = setTimeout(() => { try { context.stop(); } catch (e) {} }, 1500);
        //     } else if (exitStopTimer) { clearTimeout(exitStopTimer); exitStopTimer = null; }
        // });
        // window.addEventListener('pagehide', () => { if (hasLoaded) { try { context.stop(); } catch (e) {} } });

        // Hard scroll-lock: the TV system overlay / focus changes can scroll the document and leave the
        // whole UI shifted up. All layers are position:fixed (immune to the WebView window resize the
        // overlay triggers), and this snaps any stray scroll back to the top. (MA-4513)
        const resetScroll = () => { if (window.scrollY || window.scrollX) window.scrollTo(0, 0); };
        window.addEventListener('scroll', resetScroll, { passive: true });
        window.addEventListener('resize', resetScroll);

        // TEMP (MA-4513 error-905 probe): observe the transport commands the SENDER issues. An interceptor
        // MUST return the (unchanged) request or the command is dropped — these only log + pass through.
        const MsgType = cast.framework.messages.MessageType;
        let loadCount = 0;
        playerManager.setMessageInterceptor(MsgType.LOAD, (req) => {
            loadCount++;
            let url = '(none)';
            try { url = (req && req.media && (req.media.contentUrl || req.media.contentId)) || '(none)'; } catch (e) {}
            const at = (req && req.currentTime != null) ? Math.round(req.currentTime) : 0;
            diag('LOAD #' + loadCount + ' start@' + at + 's\n  ' + url);
            // Paint the blurred cover NOW, from the LOAD request's customData — it's paint-only (no CORS)
            // and shouldn't wait for PLAYER_LOAD_COMPLETE (which never fires if the video fails to load).
            // So the frosted background appears the instant the cast loads, even before/without playback.
            try {
                const cd = req && req.media && req.media.customData;
                if (cd) {
                    if (cd.cover) applyCover(cd.cover);
                    if (cd.audio) desiredAudioLabel = cd.audio;
                }
            } catch (e) {}
            return req;
        });
        playerManager.setMessageInterceptor(MsgType.STOP, (req) => { diag('>> STOP received'); return req; });
        playerManager.setMessageInterceptor(MsgType.SEEK, (req) => {
            const at = (req && req.currentTime != null) ? Math.round(req.currentTime) : '?';
            diag('>> SEEK ' + at + 's'); return req;
        });
        playerManager.setMessageInterceptor(MsgType.PAUSE, (req) => { diag('>> PAUSE'); return req; });

        // MA-4513 M4 — TV-remote next / prev. The remote's skip-forward / skip-back keys reach the
        // receiver as QUEUE_NEXT / QUEUE_PREV media messages (raw D-pad keys are NOT delivered to a web
        // receiver). We have no media queue, so instead of the default queue handling we forward the
        // intent to the phone on the reboot channel and drop the default (return null). The phone then
        // runs the SAME GoToNext / GoToPrevious it uses for its on-screen buttons and drives the seek
        // back to us over the media channel — so remote and phone navigation are identical.
        const Command = cast.framework.messages.Command;
        function forwardRemoteCommand(command) {
            diag('>> REMOTE ' + command + ' -> phone');
            try {
                context.sendCustomMessage(NAMESPACE, undefined, JSON.stringify({ type: 'remoteCommand', command: command }));
            } catch (e) {
                castDebugLogger.warn('Reboot', 'remote command forward failed: ' + e);
            }
        }
        playerManager.setMessageInterceptor(MsgType.QUEUE_NEXT, () => { forwardRemoteCommand('next'); return null; });
        playerManager.setMessageInterceptor(MsgType.QUEUE_PREV, () => { forwardRemoteCommand('previous'); return null; });

        // Advertise skip-next / skip-prev so the Google TV remote-control UI enables those affordances
        // (MediaStatus.supportedMediaCommands drives the TV controls). additive: keeps the default
        // PLAY_PAUSE / SEEK that the phone's transport sync (M2) relies on.
        function enableRemoteNavCommands() {
            playerManager.addSupportedMediaCommands(Command.QUEUE_NEXT | Command.QUEUE_PREV, true);
        }
        enableRemoteNavCommands();

        const options = new cast.framework.CastReceiverOptions();
        options.useShakaForHls = true;
        context.start(options);
    </script>
</body>
</html>
