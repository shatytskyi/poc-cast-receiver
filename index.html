<!DOCTYPE html>
<!--
  MA-4513 — Custom Web Receiver.

  M1: plays the workout HLS (useShakaForHls = true — robust HLS, same as Harna).
  M3a: minimal overlay (title + timer) from the phone's reboot channel.
  M3b: FULL custom side-panel layout (no built-in <cast-media-player> chrome — own
       <video class="castMediaElement"> per the Cast "Custom UI data binding" path). Vertical 9:16
       video is centred/pillarboxed over a blurred workout-cover frosted-glass ambient; exercise name +
       "N of M" + "next up" sit LEFT of the video, the timer + ring sit RIGHT, a segmented
       progress bar runs along the top; intro/outro show a right-panel "tap X on your phone" CTA.
  Design: skinned to the app's REAL Reboot design system — accent #FF4400 (orange50), Inter for text +
       IBM Plex Sans for the big timer digits (the actual app TTFs, served beside this file), white-on-grey
       progress bar, 16px-radius chips/cards, primary-button styling for the CTA. (RebootTheme* tokens.)
  Completion: the full-screen "Workout complete" card shows when the OUTRO VIDEO FULLY ENDS (the phone
       pauses at the very end) — detected receiver-side via the `ended` event / currentTime≈duration.
       While the outro is still playing it stays a right-panel "Complete" prompt. (The 3·2·1 countdown is
       intentionally NOT mirrored — still plays on the phone.)

  Channel (phone → TV only): urn:x-cast:com.amomedia.musclemate.reboot.
       CastOverlayMessage (overlay state) + {type:"audioTrack",audio} (Shaka rendition).
       (A TV → phone remote-routing path was investigated and abandoned — see the M4 note near context.start.)
  Deploy: GitHub Pages → registered Custom Receiver 95AE9DBA; end+restart the cast session to refresh.
-->
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MadMuscles Reboot Receiver</title>
    <style>
        /* Real Reboot fonts (the exact app TTFs, served from this repo next to index.html). Inter for all
           text; IBM Plex Sans for the large timer digits (RebootThemeTypography.digitsLargeBold). */
        @font-face {
            font-family: 'InterReboot'; font-weight: 100 900; font-style: normal; font-display: swap;
            src: url('inter_variable.ttf') format('truetype');
        }
        @font-face {
            font-family: 'PlexReboot'; font-weight: 100 900; font-style: normal; font-display: swap;
            src: url('ibm_plex_sans_variable.ttf') format('truetype');
        }

        :root {
            /* Reboot semantic tokens (dark) — RebootThemeColors.kt */
            --accent: #FF4400;             /* orange50 — the real Reboot accent */
            --text: #FFFFFF;               /* textPrimary */
            --text-secondary: #B3B3B3;     /* grey70 / textSecondary */
            --text-tertiary: #808080;      /* grey50 / textTertiary */
            --dim: #B3B3B3;                /* alias → textSecondary */
            --faint: #808080;              /* idle text → textTertiary */
            --on-light-strong: rgba(18,18,18,0.40);   /* overlayOnLightStrong — chip/button bg over video */
            --on-light-heavy: rgba(18,18,18,0.60);    /* overlayOnLightHeavy — completion card scrim */
            --on-dark-subtle: rgba(255,255,255,0.12); /* overlayOnDarkSubtle */
            --on-dark-soft: rgba(255,255,255,0.16);   /* overlayOnDarkSoft */
            --r-l: 16px;                   /* shapes.large */
            --font-ui: 'InterReboot', -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
            --font-digits: 'PlexReboot', 'InterReboot', system-ui, sans-serif;
            --gap: 1.6vh;        /* offset of the progress bar from the top screen edge */
            --video-gap: 4vh;    /* double gap above the video — clears the top progress bar; single 2vh below */
            /* Frosted-glass ambient (blurred workout cover behind the video). */
            --ambient-blur: 60px;             /* blur radius of the cover */
            --ambient-scale: 1.2;             /* overscan so blurred edges never show */
            --frost: rgba(18, 19, 20, 0.46);  /* neutral-black frost over the cover (Reboot neutrals) */
            /* Cover-not-loaded fallback gradient. Shared by #ambient AND the #idle splash so the splash sits
               on the exact same background as the workout screen — the idle→player crossfade keeps it static. */
            --ambient-grad: radial-gradient(120% 95% at 50% 28%, #2A2A2A 0%, #1E1E1E 56%, #121212 100%);
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none;
            background: #121212; color: var(--text);     /* surfaceTertiary */
            font-family: var(--font-ui);
            -webkit-font-smoothing: antialiased;
        }

        /* Frosted-glass ambient: blurred workout cover (set from load customData.cover) with a fallback
           gradient, overscaled so the blur's soft edges never reach the screen border. The #frost layer
           on top darkens it so the white/orange UI stays legible. Both sit behind #stage. CSS filter only
           paints — it never reads pixels — so no canvas/CORS taint.
           Layers stack on LOW POSITIVE z-index (below the player UI, above the body box background). They
           must NOT be negative: html+body carry a background, so body's box paints over any negative-z
           layer and the cover/gradient turns solid black. The OS system overlay is drawn above the WebView,
           so page z-index can't affect it (the real overlay-stability fix is position:fixed). */
        #ambient {
            position: fixed; inset: 0; z-index: 1;
            background: var(--ambient-grad);
        }
        /* The blurred cover sits on its own layer above the gradient and fades in (opacity 0 → 1) once
           the image has loaded, so it never pops in instantly. */
        #cover {
            position: fixed; inset: 0; z-index: 2;
            background-size: cover; background-position: center;
            filter: blur(var(--ambient-blur)) saturate(1.15);
            transform: scale(var(--ambient-scale));
            opacity: 0; transition: opacity 3000ms ease;
        }
        #frost { position: fixed; inset: 0; z-index: 3; background: var(--frost); }

        /* Side panels + video layer, above the ambient/frost layers. */
        #stage {
            position: fixed; inset: 0; z-index: 4;
            display: grid;
            grid-template-columns: 1fr minmax(0, auto) 1fr;
            align-items: center;                     /* centers the side panels vertically */
            padding: 0 4.5%;                         /* horizontal only → video flush to the top */
            background: transparent;                 /* the #ambient layer is the background now */
        }
        /* Kill the native video controls bar that the platform flashes on pause/unpause. */
        #video::-webkit-media-controls,
        #video::-webkit-media-controls-enclosure,
        #video::-webkit-media-controls-panel { display: none !important; -webkit-appearance: none !important; }
        #video {
            grid-column: 2; justify-self: center; align-self: start;
            margin-top: var(--video-gap);   /* double gap on top (room for the top progress bar) */
            /* Explicit vh height + aspect-ratio is the combo that actually RENDERS on the dongle.
               (height:100% of a grid track, or width:auto without an aspect, left the video black.)
               4vh top + 94vh height = 98vh, leaving a single 2vh gap at the bottom. */
            height: 94vh; aspect-ratio: 9 / 16; max-width: 100%;
            background: #000; border-radius: 10px;
            box-shadow: 0 10px 44px -10px rgba(0,0,0,0.75);
        }

        /* Side panels */
        .panel { grid-row: 1; align-self: center; min-width: 0; }
        .panel.left { grid-column: 1; padding-right: 3%; }
        .panel.right { grid-column: 3; padding-left: 3%; display: flex; flex-direction: column; align-items: center; text-align: center; }
        /* Eyebrow = Reboot section-header style (bodySBold, uppercase, textSecondary). */
        .eyebrow {
            margin: 0 0 1.2vh; font-size: clamp(11px, 1.5vw, 15px); font-weight: 700;
            letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-secondary);
        }
        .eyebrow:empty { display: none; }   /* no empty-label gap (e.g. the Rest phase has no eyebrow) */
        /* Title = titleXl (700, -0.02em). */
        .left .title { margin: 0; font-size: clamp(20px, 3.6vw, 40px); font-weight: 700; line-height: 1.08; letter-spacing: -0.02em; }
        .left .sub { margin: 1.6vh 0 0; font-size: clamp(13px, 1.7vw, 18px); color: var(--text-secondary); }
        .left .sub b { color: var(--text); font-weight: 600; }

        /* Timer + ring. Digits use IBM Plex Sans (digitsLargeBold), ring uses the accent. */
        .timer { position: relative; width: clamp(110px, 18vw, 200px); aspect-ratio: 1; display: grid; place-items: center; }
        .timer svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
        .timer .track { fill: none; stroke: var(--on-dark-soft); stroke-width: 6; }
        .timer .fill {
            fill: none; stroke: var(--text); stroke-width: 6; stroke-linecap: round;
            stroke-dashoffset: 0; transition: stroke-dashoffset 950ms linear;
        }
        .timer .value { font-family: var(--font-digits); font-size: clamp(30px, 5.2vw, 58px); font-weight: 700; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; line-height: 1; }
        .timer .value.label { font-family: var(--font-ui); font-size: clamp(20px, 3vw, 34px); font-weight: 700; letter-spacing: 0.02em; }
        .timer.no-ring svg { display: none; }
        .right.hide-timer .timer { display: none; }

        /* Right-panel action prompt (intro → Start workout, outro → Complete): mirrors the phone's
           primaryLarge button (accent fill, white labelLarge, radius-large, trailing arrow) + a quiet
           "tap on your phone" hint with a phone glyph. Shown in place of the timer. */
        #rightPrompt { display: none; flex-direction: column; align-items: center; gap: 1.8vh; max-width: 26vw; }
        .right.show-prompt .timer { display: none; }
        .right.show-prompt #rightPrompt { display: flex; }
        .cta {
            display: inline-flex; align-items: center; gap: 10px; min-height: 48px; padding: 1.3vh 3vh;
            background: var(--accent); color: var(--text); border-radius: var(--r-l);
            font-size: clamp(16px, 2vw, 22px); font-weight: 600; letter-spacing: -0.01em; white-space: nowrap;
        }
        .cta .arrow { width: 20px; height: 20px; position: relative; flex: none; }
        .cta .arrow::before { content: ""; position: absolute; top: 50%; left: 1px; width: 14px; height: 2px; background: currentColor; transform: translateY(-50%); }
        .cta .arrow::after { content: ""; position: absolute; top: 50%; right: 1px; width: 9px; height: 9px; border-top: 2px solid currentColor; border-right: 2px solid currentColor; transform: translateY(-50%) rotate(45deg); }
        .cta-hint { display: inline-flex; align-items: center; gap: 9px; font-size: clamp(13px, 1.6vw, 18px); color: var(--text-secondary); }
        .prompt-glyph { width: 22px; height: 33px; border: 2px solid var(--text-secondary); border-radius: 5px; position: relative; flex: none; }
        .prompt-glyph::after { content: ""; position: absolute; left: 50%; bottom: 4px; width: 8px; height: 2px; transform: translateX(-50%); background: var(--text-secondary); border-radius: 2px; }

        /* Segmented progress — Reboot PlayerProgressBar: track = textSecondary (grey70), fill = WHITE
           (textPrimary), h6 r3; intro/outro are fixed-width "bookends", exercises flex between them. */
        #progress { position: absolute; left: 4.5%; right: 4.5%; top: var(--gap); display: flex; align-items: center; gap: 6px; }
        .seg { flex: 1; height: 6px; border-radius: 3px; background: var(--text-secondary); overflow: hidden; }
        .seg.bookend { flex: 0 0 5.5%; }
        .seg.bookend:first-child { margin-right: 6px; }
        .seg.bookend:last-child { margin-left: 6px; }
        /* Fill grows via transform:scaleX (compositor-only) — NOT width, which would reflow every frame
           of the transition on the weak dongle. Outer rounding comes from the track's overflow+radius. */
        .seg i { display: block; height: 100%; width: 100%; background: var(--text); transform: scaleX(0); transform-origin: left center; transition: transform 320ms ease; }

        /* Top-left workout chip — Reboot rounded chip (radius-large, on-light-strong bg) + accent dot. */
        #chip {
            position: absolute; top: 4.4%; left: 4.6%; display: inline-flex; align-items: center; gap: 9px;
            font-size: clamp(12px, 1.5vw, 16px); color: var(--text-secondary); font-weight: 600;
            background: var(--on-light-strong); border-radius: var(--r-l); padding: 0.9vh 1.4vw;
        }
        #chip:empty { display: none; }
        #chip::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex: none; }

        /* Full-screen completion card — shown when the outro VIDEO fully ends (not on a phase flag). */
        #card {
            position: absolute; inset: 0; z-index: 7; display: none; flex-direction: column; align-items: center; justify-content: center;
            gap: 1.6vh; background: var(--on-light-heavy); text-align: center;
        }
        #card.show { display: flex; }
        #cardLabel { font-size: clamp(13px, 1.8vw, 18px); letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
        #cardTitle { margin: 0; font-size: clamp(26px, 4.6vw, 50px); font-weight: 700; letter-spacing: -0.02em; }
        #cardHint {
            margin-top: 1vh; display: inline-flex; align-items: center; gap: 12px;
            border: 1px solid var(--on-dark-soft); background: var(--on-dark-subtle);
            padding: 1.4vh 2.4vw; border-radius: 999px; font-size: clamp(14px, 1.8vw, 19px); font-weight: 600; color: var(--text);
        }
        #cardHint .glyph { width: 20px; height: 30px; border: 2px solid var(--text-secondary); border-radius: 5px; position: relative; flex: none; }
        #cardHint .glyph::after { content:""; position:absolute; left:50%; bottom:3px; width:7px; height:2px; transform:translateX(-50%); background:var(--text-secondary); border-radius:2px; }
        #cardHint.hide { display: none; }

        /* Splash / idle — the boot screen: the release "MAD" launcher mark on the SAME cover-not-loaded
           gradient the workout screen uses. On the first overlay message it crossfades out (opacity + slight
           scale) to reveal the player chrome beneath, so the background is visually continuous (idle →
           player); the blurred cover then washes in over it. */
        #idle {
            position: fixed; inset: 0; z-index: 5; display: grid; place-items: center;
            background: var(--ambient-grad);
            opacity: 1; transition: opacity 560ms ease, transform 560ms ease;
        }
        #idle.hidden { opacity: 0; transform: scale(1.06); pointer-events: none; }
        #idle.hidden .logo-mad { animation: none; }
        .splash-core { display: grid; place-items: center; }
        .logo-mad {
            width: clamp(110px, 17vw, 190px); aspect-ratio: 1;
            border-radius: 22%; background: var(--accent); display: grid; place-items: center;
            box-shadow: 0 16px 40px -18px rgba(0,0,0,0.55);   /* neutral elevation — no colour glow */
            animation: logoIn 640ms cubic-bezier(.2,.7,.2,1) 140ms both;
        }
        .logo-mad svg { width: 88%; height: 88%; display: block; }
        @keyframes logoIn { from { opacity: 0; transform: scale(0.84); } to { opacity: 1; transform: scale(1); } }
        @media (prefers-reduced-motion: reduce) {
            .logo-mad { animation: none; }
        }
        /* Load / playback error feedback (MA-4513) — replaces the silent splash-hang with a visible message. */
        #error { position: fixed; inset: 0; z-index: 7; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 1.6vh; padding: 6vw; text-align: center; background: rgba(8,9,12,0.92); }
        #error.show { display: flex; }
        #error .err-title { font-size: clamp(20px, 3.4vw, 40px); font-weight: 700; color: var(--text); }
        #error .err-sub { font-size: clamp(13px, 1.8vw, 20px); color: var(--text-secondary); max-width: 70vw; line-height: 1.4; }
        #error .err-code { font: 12px/1.4 monospace; color: var(--faint); max-width: 80vw; word-break: break-word; }

        /* Buffering spinner — shown while the video (re)buffers so the TV isn't a frozen/black frame. */
        #spinner {
            position: fixed; left: 50%; top: 50%; width: 64px; height: 64px;
            margin: -32px 0 0 -32px; box-sizing: border-box;
            border: 4px solid var(--on-dark-soft); border-top-color: var(--text);
            border-radius: 50%; display: none; z-index: 6;
        }
        #spinner.show { display: block; }
        @media (prefers-reduced-motion: no-preference) {
            #spinner.show { animation: spin 0.85s linear infinite; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TEMP diagnostic (MA-4513 error-905 probe): surfaces the player ERROR code + Shaka detail on
           screen to confirm the CORS fix (§5). Hidden by default — flip to display:block when debugging
           the CDN CORS issue. */
        #diag { display: none; position: fixed; left: 10px; bottom: 10px; z-index: 9; max-width: 60vw; font: 13px/1.35 monospace; color: rgba(255,170,150,0.9); pointer-events: none; white-space: pre-wrap; }

        /* On-screen ERROR feed (bottom-left) — surfaces any load failure / JS crash for the current POC
           build. Hidden until something errors; error-red to stand apart from the (usually-off) #diag probe
           that shares this corner. z-index above #diag so an error is never hidden behind the transport log. */
        #errlog { display: none; position: fixed; left: 10px; bottom: 10px; z-index: 10; max-width: 64vw; font: 13px/1.4 monospace; color: rgba(255,105,70,0.96); pointer-events: none; white-space: pre-wrap; word-break: break-word; }
        #errlog.show { display: block; }

        /* Receiver build version — bumped on every deploy so we can confirm what's actually running. */
        #version { position: fixed; right: 10px; bottom: 10px; z-index: 9; font: 11px monospace; color: rgba(255,255,255,0.3); pointer-events: none; }
        /* TEMP (MA-4513 §6.6.1): on-screen readout of the ABR-selected variant + the device height cap, so
           the device-tiered selection is observable (the test rungs have no burned-in label). Remove with DIAG_FORCE_URL. */
        #resinfo { position: fixed; left: 10px; top: 10px; z-index: 9; font: 12px/1.45 monospace; color: rgba(120,230,150,0.9); white-space: pre; pointer-events: none; text-shadow: 0 1px 2px #000; }
    </style>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
</head>
<body>
    <div id="ambient"></div>
    <div id="cover"></div>
    <div id="frost"></div>

    <div id="stage" class="screen">
        <video id="video" class="castMediaElement"></video>

        <div class="panel left">
            <p class="eyebrow" id="leftEyebrow"></p>
            <h2 class="title" id="leftTitle"></h2>
            <p class="sub" id="leftSub"></p>
        </div>

        <div class="panel right" id="rightPanel">
            <div class="timer">
                <svg viewBox="0 0 100 100" aria-hidden="true">
                    <circle class="track" cx="50" cy="50" r="46"></circle>
                    <circle class="fill" id="ring" cx="50" cy="50" r="46"></circle>
                </svg>
                <div class="value" id="timerValue"></div>
            </div>
            <div id="rightPrompt">
                <div class="cta-hint"><span class="prompt-glyph"></span><span>Tap on your phone</span></div>
                <div class="cta"><span id="promptBtn"></span><span class="arrow"></span></div>
            </div>
        </div>

        <div id="chip"></div>
        <div id="progress"></div>

        <div id="card">
            <div id="cardLabel"></div>
            <h1 id="cardTitle"></h1>
            <div id="cardHint"><span class="glyph"></span><span id="cardHintText"></span></div>
        </div>
    </div>

    <div id="idle">
        <div class="splash-core">
            <div class="logo-mad">
                <!-- "MAD" release launcher logotype — vector paths lifted from ic_logo_cropped.xml, centered. -->
                <svg viewBox="0 0 44 44" aria-label="MadMuscles">
                    <g transform="translate(22 22) scale(1.1) translate(-22.579 -16.628)" fill="#121212">
                        <path d="M18.998,5.372V29.76H15.246V7.248H13.54V29.76H9.788V7.248H8.083V29.76H4.331V5.372L6.207,3.496H10.642L11.665,4.52L12.689,3.496H17.122L18.998,5.372Z"/>
                        <path d="M29.912,5.372V29.76H26.16V18.504H24.455V29.76H20.703V5.372L22.579,3.496H28.036L29.912,5.372ZM24.455,14.752H26.16V7.248H24.455V14.752Z"/>
                        <path d="M40.827,5.713V27.543L38.61,29.76H31.618V3.496H38.61L40.827,5.713ZM35.37,26.008H37.075V7.248H35.37V26.008Z"/>
                    </g>
                </svg>
            </div>
        </div>
    </div>
    <div id="error">
        <div class="err-title" id="errTitle">Playback error</div>
        <div class="err-sub" id="errSub"></div>
        <div class="err-code" id="errCode"></div>
    </div>
    <div id="spinner"></div>
    <div id="diag"></div>
    <div id="errlog"></div>
    <div id="version">v0.0.40</div>
    <div id="resinfo"></div>

    <script>
        const NAMESPACE = 'urn:x-cast:com.amomedia.musclemate.reboot';
        const RING_C = 2 * Math.PI * 46;

        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        const castDebugLogger = cast.debug.CastDebugLogger.getInstance();
        context.setLoggerLevel(cast.framework.LoggerLevel.DEBUG);

        const el = (id) => document.getElementById(id);
        const screenEl = el('stage');
        const chipEl = el('chip'), idleEl = el('idle'), progressEl = el('progress');
        const leftEyebrow = el('leftEyebrow'), leftTitle = el('leftTitle'), leftSub = el('leftSub');
        const rightPanel = el('rightPanel'), timerValue = el('timerValue'), ring = el('ring');
        const timerEl = document.querySelector('.timer');
        const promptBtnEl = el('promptBtn');
        const cardEl = el('card'), cardLabel = el('cardLabel'), cardTitle = el('cardTitle'), cardHint = el('cardHint'), cardHintText = el('cardHintText');
        const errorEl = el('error'), errTitle = el('errTitle'), errSub = el('errSub'), errCode = el('errCode');

        ring.style.strokeDasharray = RING_C.toFixed(1);

        // TEMP (MA-4513 error-905 probe): an on-screen APPEND log of the media-load lifecycle, each line
        // timestamped (ms since the receiver booted). Records every incoming LOAD/STOP/SEEK transport
        // command (via the interceptors below) plus loading / loaded / error events. Remove once the CDN
        // CORS issue is fixed and casting is confirmed.
        const diagEl = el('diag');
        const diagLines = [];
        const nowMs = () => (typeof performance !== 'undefined' && performance.now) ? performance.now() : 0;
        const t0 = nowMs();
        function diag(line) {
            diagLines.push('+' + Math.round(nowMs() - t0) + 'ms ' + line);
            while (diagLines.length > 14) diagLines.shift();
            diagEl.textContent = diagLines.join('\n');
        }

        // On-screen ERROR feed (bottom-left): any load failure or JS crash lands here, timestamped, so we
        // get visible feedback on the TV without a debugger attached. Shown only once something errors;
        // capped so it can't grow unbounded. (POC-level feedback — later this should also reach the phone
        // / analytics, §6 §12.)
        const errlogEl = el('errlog');
        const errlogLines = [];
        let lastLoadedUrl = '(none)';   // last media URL seen on LOAD — carried in the error context below
        function logError(line) {
            errlogLines.push('+' + Math.round(nowMs() - t0) + 'ms  ' + line);
            while (errlogLines.length > 20) errlogLines.shift();
            // Carry the useful debugging info WITH the error: the loaded manifest URL (so it can be read
            // off the TV screen), the requested audio rendition, the phase, the build, and the device UA
            // (tells an LG webOS apart from a Chromecast dongle at a glance). Wrapped in try/catch so a
            // still-uninitialised var can never break the error readout itself.
            let ctx = '';
            try {
                ctx = '\n' + [
                    '── context ──',
                    'url:   ' + lastLoadedUrl,
                    'audio: ' + (desiredAudioLabel || '(none)'),
                    'phase: ' + (currentPhase || '(none)'),
                    'build: ' + (el('version') ? el('version').textContent : '?'),
                    'ua:    ' + navigator.userAgent,
                ].join('\n');
            } catch (e) {}
            errlogEl.textContent = errlogLines.join('\n') + ctx;
            errlogEl.classList.add('show');
        }

        // Segments = [introProgress, ...exerciseProgresses, outroProgress]; first + last render as
        // fixed-width bookends (intro/outro), the middle exercises flex between them (Reboot progress bar).
        function renderSegments(arr) {
            if (progressEl.children.length !== arr.length) {
                progressEl.innerHTML = '';
                arr.forEach((_, i) => {
                    const s = document.createElement('div');
                    s.className = 'seg' + ((i === 0 || i === arr.length - 1) ? ' bookend' : '');
                    s.innerHTML = '<i></i>';
                    progressEl.appendChild(s);
                });
            }
            [...progressEl.children].forEach((seg, i) => {
                const frac = Math.max(0, Math.min(1, arr[i] || 0));
                seg.querySelector('i').style.transform = 'scaleX(' + frac + ')';
            });
        }

        function parseTimerSec(t) {
            if (!t) return 0;
            const parts = t.split(':');
            return (parseInt(parts[0], 10) || 0) * 60 + (parseInt(parts[1], 10) || 0);
        }

        function setTimerRing(d) {
            timerValue.textContent = d.timer || '';
            const total = d.timerTotalSec || 0;
            const frac = total > 0 ? Math.max(0, Math.min(1, parseTimerSec(d.timer) / total)) : 1;
            ring.style.strokeDashoffset = (RING_C * (1 - frac)).toFixed(1);
        }

        function renderPanels(d) {
            let eyebrow = '', title = '', sub = '';
            let rightMode = 'hidden', rightLabel = '', promptBtn = '';
            const num = (d.exerciseNumber && d.exerciseCount) ? 'Exercise ' + d.exerciseNumber + ' of ' + d.exerciseCount : '';
            switch (d.phase) {
                case 'exerciseActive':
                    eyebrow = num; title = d.title || ''; sub = d.nextTitle ? 'Next up · ' + d.nextTitle : ''; rightMode = 'timer'; break;
                case 'exercisePreview':
                    eyebrow = 'Up next'; title = d.title || ''; rightMode = 'label'; rightLabel = 'Preview'; break;
                case 'exerciseRest':
                    // Rest: the LEFT shows "Rest" in place of the exercise name; the next exercise drops to
                    // the sub-line. Timer (ring + mm:ss) stays on the right. (The video is NOT dimmed — an
                    // earlier rest video-dim caused a compositor stall on the dongle and was removed, §5.1.)
                    title = 'Rest'; sub = d.nextTitle ? 'Next up · ' + d.nextTitle : 'Catch your breath'; rightMode = 'timer'; break;
                case 'intro':
                    // Intro VIDEO stays visible; the call-to-action is the prominent right-panel prompt,
                    // labelled with the phone's exact button text.
                    eyebrow = 'Get started'; title = d.workoutTitle || 'Workout';
                    rightMode = 'prompt'; promptBtn = 'Start workout'; break;
                case 'outro':
                    eyebrow = 'Almost done'; title = d.workoutTitle || '';
                    rightMode = 'prompt'; promptBtn = 'Complete'; break;
                default:
                    break; // completion is driven by the video ending, not a phase (see updateCard)
            }
            leftEyebrow.textContent = eyebrow;
            leftTitle.textContent = title;
            leftSub.textContent = sub;
            applyRight(rightMode, rightLabel, d, promptBtn);
        }

        // Right panel: 'timer' = ring + mm:ss, 'prompt' = primary-button CTA + "tap on your phone" hint,
        // 'label' = a bare word, 'hidden' = nothing.
        function applyRight(mode, label, d, promptBtn) {
            rightPanel.classList.toggle('show-prompt', mode === 'prompt');
            if (mode === 'prompt') {
                rightPanel.classList.remove('hide-timer');
                promptBtnEl.textContent = promptBtn || '';
                return;
            }
            if (mode === 'hidden') { rightPanel.classList.add('hide-timer'); return; }
            rightPanel.classList.remove('hide-timer');
            if (mode === 'timer') {
                timerEl.classList.remove('no-ring');
                timerValue.classList.remove('label');
                setTimerRing(d);
            } else {
                timerEl.classList.add('no-ring');
                timerValue.classList.add('label');
                timerValue.textContent = label;
            }
        }

        // The full-screen "Workout complete" card shows when the outro VIDEO has fully ended (the phone
        // pauses at the very end), NOT on a phase flag — so while the outro is still playing the TV keeps
        // the video + the right-panel "Complete" prompt, and only flips to the celebration once playback
        // truly finishes. `videoEnded` is driven by the HTML5 `ended` event and the watchdog below.
        let currentPhase = '';
        let videoEnded = false;
        function updateCard() {
            const show = videoEnded || currentPhase === 'completed';
            cardEl.classList.toggle('show', show);
            if (show) {
                cardLabel.textContent = 'Workout complete';
                cardTitle.textContent = 'Nice work 💪';
                cardHintText.textContent = 'Continue on your phone';
                cardHint.classList.remove('hide');
            }
        }

        function applyOverlay(d) {
            if (!d || d.type !== 'overlay') return;
            idleEl.classList.add('hidden');
            currentPhase = d.phase;
            // Left the end of the workout (e.g. Previous pressed on the phone from the completion card):
            // drop the ended flag so the celebration card stops covering the video.
            if (d.phase !== 'outro' && d.phase !== 'completed') videoEnded = false;
            screenEl.dataset.phase = d.phase;
            chipEl.textContent = d.workoutTitle || '';
            renderSegments(d.segments || []);
            renderPanels(d);
            updateCard();
        }

        // Audio rendition (language + music/voice) the phone wants on the TV. Stored so a switch
        // requested before Shaka has parsed the manifest is applied once PLAYER_LOAD_COMPLETE fires.
        let desiredAudioLabel = null;
        function applyAudioLabel(label) {
            if (!label) return;
            desiredAudioLabel = label;
            const shaka = playerManager.getShakaPlayer && playerManager.getShakaPlayer();
            if (!shaka) return;   // not ready yet — PLAYER_LOAD_COMPLETE retries with desiredAudioLabel
            try {
                // Shaka matches the HLS rendition by its NAME/label; clearBuffer=true swaps instantly.
                shaka.selectVariantsByLabel(label, true);
                // Fallback for manifests that surface the rendition NAME as originalAudioId, not label.
                const tracks = shaka.getVariantTracks();
                if (!tracks.some(t => t.label === label && t.active)) {
                    const byId = tracks.find(t => t.originalAudioId === label);
                    if (byId) shaka.selectVariantTrack(byId, true);
                }
            } catch (e) {
                castDebugLogger.warn('Reboot', 'audio switch failed for "' + label + '": ' + e);
            }
        }

        context.addCustomMessageListener(NAMESPACE, (event) => {
            let data = event.data;
            if (typeof data === 'string') {
                try { data = JSON.parse(data); } catch (e) { castDebugLogger.warn('Reboot', 'bad msg: ' + event.data); return; }
            }
            if (data && data.type === 'audioTrack') { applyAudioLabel(data.audio); return; }
            applyOverlay(data);
        });

        // Buffering spinner. The single honest signal for "is the video actually playing" is whether
        // currentTime is advancing — both PLAYER_LOAD_COMPLETE and the HTML5 `playing` event fire when
        // the FIRST frame is presented while Shaka is still buffering segments (so they hid the spinner
        // seconds too early). A 250 ms watchdog hides the spinner only once time really advances and
        // re-shows it whenever playback stalls — never while the video is intentionally paused.
        const spinnerEl = el('spinner');
        const videoEl = el('video');
        // Debounced so rapid seeks (clicking "next" many times fast) don't make the spinner strobe:
        // show immediately, but defer HIDING ~350 ms — a burst of seek/buffer/waiting events keeps
        // cancelling the pending hide, so it stays one steady spinner and only clears once playback
        // actually settles, instead of flickering on/off per event.
        let bufferingHideTimer = null;
        const setBuffering = (on) => {
            if (on) {
                if (bufferingHideTimer) { clearTimeout(bufferingHideTimer); bufferingHideTimer = null; }
                spinnerEl.classList.add('show');
            } else if (!bufferingHideTimer) {
                bufferingHideTimer = setTimeout(() => { spinnerEl.classList.remove('show'); bufferingHideTimer = null; }, 350);
            }
        };
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOADING, () => { setBuffering(true); diag('PLAYER_LOADING'); });
        playerManager.addEventListener(cast.framework.events.EventType.BUFFERING, (event) => { if (event.isBuffering) setBuffering(true); });
        videoEl.addEventListener('waiting', () => setBuffering(true));
        videoEl.addEventListener('seeking', () => { setBuffering(true); lastPos = -1; });
        // Natural end of the outro video → celebration card (the phone is paused at the very end).
        videoEl.addEventListener('ended', () => { videoEnded = true; setBuffering(false); updateCard(); });

        // Load / playback error feedback — instead of hanging silently on the splash, show a visible error
        // and hide the spinner. Two triggers: the CAF ERROR event (explicit failures incl. CORS → shaka
        // 1002 → CAF 905) and the load timeout in the watchdog below (a silent stall that never fires
        // ERROR). Cleared on a fresh LOAD and once playback actually advances.
        let awaitingPlayback = false, loadStartedAt = 0;
        const LOAD_TIMEOUT_MS = 15000;
        function showError(title, sub, code) {
            awaitingPlayback = false;
            setBuffering(false);
            idleEl.classList.add('hidden');
            errTitle.textContent = title;
            errSub.textContent = sub || '';
            errCode.textContent = code || '';
            errorEl.classList.add('show');
        }
        function hideError() { errorEl.classList.remove('show'); }

        // TEMP (MA-4513 §6.6.1): show the ABR-selected variant + the device height cap on screen, so the
        // device-tiered selection is observable (the portrait test rungs are all 9:16 with no burned-in
        // label → otherwise indistinguishable). '*' marks the active track. Remove with DIAG_FORCE_URL.
        const resinfoEl = el('resinfo');
        let lastActiveWxH = '?';       // last ACTUAL active variant seen by the poll — the real one at error time
        let lastActiveHeightNum = 0;   // its height as a number, for the fallback step
        function updateResInfo() {
            try {
                const shaka = playerManager.getShakaPlayer && playerManager.getShakaPlayer();
                if (!shaka || !shaka.getVariantTracks) { resinfoEl.textContent = ''; return; }
                const tracks = shaka.getVariantTracks().filter(t => t.width && t.height);
                if (!tracks.length) { resinfoEl.textContent = ''; return; }
                const active = tracks.find(t => t.active);
                if (active && active.width) { lastActiveWxH = active.width + '×' + active.height; lastActiveHeightNum = active.height; }
                const cap = (maxDecodableHeight === null ? '?' : ('≤' + maxDecodableHeight));
                const sel = active ? (active.width + '×' + active.height) : '—';
                const avail = tracks.map(t => t.width + '×' + t.height + (t.active ? '*' : '')).join('  ');
                resinfoEl.textContent =
                    envProbe + '\n' +
                    tierProbe + '\n' +
                    'cfg: ' + cfgProbe + '\n' +
                    'mf: ' + (manifestHandlerSeen || '—') + '  last: ' + lastManifestReqTail + '\n' +
                    'playing ' + sel + '   probeCap ' + cap + (fallbackAttempts ? '  fb#' + fallbackAttempts : '') + '\n[' + avail + ']';
            } catch (e) {}
        }

        let lastPos = -1, lastAdvanceAt = 0;
        setInterval(() => {
            updateResInfo();
            // Completion detection: the phone pauses at the very end of the outro, which can land just
            // shy of `ended` firing — so also treat "outro + parked within 0.4 s of duration" as ended,
            // and undo it if playback ever moves back from the end.
            const dur = videoEl.duration;
            if (currentPhase === 'outro' && isFinite(dur) && dur > 0) {
                if (videoEl.currentTime >= dur - 0.4) {
                    if (!videoEnded) { videoEnded = true; updateCard(); }
                } else if (videoEnded && videoEl.currentTime < dur - 1) {
                    videoEnded = false; updateCard();
                }
            }

            // LOAD arrived but nothing ever played (a silent stall that never fires ERROR) → surface it
            // instead of hanging on the splash forever. showError() clears the flag so it fires once.
            if (awaitingPlayback && loadStartedAt > 0 && (Date.now() - loadStartedAt) > LOAD_TIMEOUT_MS) {
                logError('load timeout — no playback after ' + (LOAD_TIMEOUT_MS / 1000) + 's');
                showError('Can’t reach the TV', 'The workout video didn’t start. Check the connection and try again.', 'load timeout after ' + (LOAD_TIMEOUT_MS / 1000) + 's');
            }

            // Paused / ended / no data → hide any spinner that a prior waiting/seeking/BUFFERING left
            // showing, so it doesn't linger over the stopped frame, then stop (never spin while paused).
            if (videoEl.paused || videoEl.ended || videoEl.readyState < 1) { setBuffering(false); return; }
            const now = Date.now();
            if (videoEl.currentTime > lastPos + 0.05) {
                lastPos = videoEl.currentTime;
                lastAdvanceAt = now;
                setBuffering(false);            // time is moving → really playing
                if (awaitingPlayback) { awaitingPlayback = false; hideError(); }
            } else if (now - lastAdvanceAt > 500) {
                setBuffering(true);             // stalled while trying to play → buffering
            }
        }, 250);

        // Blurred workout cover as the frosted-glass ambient. CSS background-image only displays the
        // image (no canvas read), so the cross-origin CDN URL needs no CORS headers.
        const coverEl = el('cover');
        let appliedCoverUrl = null;
        function applyCover(url) {
            // Idempotent: both the LOAD interceptor and PLAYER_LOAD_COMPLETE call this; skip the second.
            if (!url || url === appliedCoverUrl) return;
            appliedCoverUrl = url;
            const safe = url.replace(/'/g, "%27");
            // Preload, then fade in: the CSS background reads the now-cached image and the opacity
            // transition (0 → 1) animates it in instead of popping instantly.
            const pre = new Image();
            pre.onload = () => {
                coverEl.style.backgroundImage = "url('" + safe + "')";
                coverEl.style.opacity = '1';
            };
            pre.src = url;
        }

        // Apply the phone's audio rendition + cover once Shaka has the manifest, and reset the
        // completion state for the freshly-loaded media.
        let hasLoaded = false;   // (kept for the future Back/Home auto-stop guard)
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
            hasLoaded = true;
            videoEnded = false; updateCard();
            awaitingPlayback = false; hideError();   // load succeeded — clear the pending-playback watchdog + any error
            const info = playerManager.getMediaInformation && playerManager.getMediaInformation();
            const customData = (info && info.customData) || {};
            applyAudioLabel(desiredAudioLabel || customData.audio);
            applyCover(customData.cover);
            // TEMP (905 probe): show the loaded URL so we can compare a working vs a stuck workout.
            try {
                const src = (info && (info.contentUrl || info.contentId)) || '(no url)';
                lastLoadedUrl = src;
                diag('LOAD_COMPLETE\n  ' + src);
            } catch (e) {}
            // §6 Step 0 probes: environment (once) + what the LIVE shaka instance actually has configured
            // — the objective signals for the abr.restrictions re-test (§3.2). Read fresh on every load:
            // CAF creates a NEW shaka.Player per load, nothing configured earlier carries over.
            try {
                if (!envLogged) {
                    envLogged = true;
                    const shakaVer = (window.shaka && shaka.Player && shaka.Player.version) || '?';
                    const hasDevInfo = typeof context.getDeviceInformation === 'function';
                    envProbe = 'CAF ' + (cast.framework.VERSION || '?') + ' · shaka ' + shakaVer + ' · devinfo ' + (hasDevInfo ? 'Y' : 'N');
                    diag(envProbe);
                }
                const shakaNow = playerManager.getShakaPlayer && playerManager.getShakaPlayer();
                const cfg = shakaNow && shakaNow.getConfiguration && shakaNow.getConfiguration();
                if (cfg) {
                    cfgProbe = 'abr.enabled=' + cfg.abr.enabled +
                        ' abr.maxH=' + (cfg.abr.restrictions ? cfg.abr.restrictions.maxHeight : '—') +
                        ' hard.maxH=' + (cfg.restrictions ? cfg.restrictions.maxHeight : '—');
                    diag('cfg: ' + cfgProbe);
                }
            } catch (e) { cfgProbe = 'cfg read failed: ' + e; }
        });

        // ── MA-4513: decode-error fallback (step DOWN the ABR height cap and reload) ──────────────
        // canDisplayType can't predict the portrait height limit (a 4K PANEL reports it can show 4K even
        // when the Cast H.264 decode path caps portrait height at ~1088), so we REACT to the actual decode
        // failure: on a 3016-class error, drop the cap just below the current tallest allowed rung and
        // reload at the same spot. Repeat until a rung renders (or we hit the lowest). This is the robust
        // "fall back to the lowest that plays" — it discovers the tallest DECODABLE rung by trying.
        let fallbackAttempts = 0;
        const MAX_FALLBACK_ATTEMPTS = 6;
        let capturedLoadRequest = null;   // the sender's LoadRequestData, captured on LOAD so a reload can reuse its media
        let forcedRungHeight = null;      // null = playing the master (ABR); else the single-rung height we forced
        // Fallback lifecycle guards (review doc §2.5/§2.8): a fresh SENDER load must reset the ladder
        // state and cancel any pending retry; a stale retry timer must never clobber a newer command.
        let loadGeneration = 0;           // bumped on every EXTERNAL (sender) LOAD/STOP
        let fallbackTimer = null;         // pending fallback reload; cancelled by newer external commands
        let pendingInternalReload = false; // marks the fallback's own load() in the LOAD interceptor
        // Single-rung media-playlist URLs, DESCENDING by height. The maxHeight restriction
        // (setMediaPlaybackInfoHandler → shakaConfig.restrictions) proved INERT on the LG (ACTIVE stayed
        // 1080x1920 even at maxHeight=1080), so the fallback swaps the contentUrl to a lower SINGLE-RUNG
        // playlist directly — one variant, no ABR, so Shaka must play exactly that resolution.
        const RUNGS_DESC = [
            { h: 1920, url: 'https://shatytskyi.github.io/madmuscles-cast-receiver/test/1080x1920/index.m3u8' },
            { h: 1280, url: 'https://shatytskyi.github.io/madmuscles-cast-receiver/test/720x1280/index.m3u8' },
            { h: 1080, url: 'https://shatytskyi.github.io/madmuscles-cast-receiver/test/608x1080/index.m3u8' },
        ];
        function isDecodeError(event) {
            // Shaka 3016 = VIDEO_ERROR / PIPELINE_ERROR_COULD_NOT_RENDER; category 3 = MEDIA. Codes may be
            // strings → coerce. CAF detailedErrorCode media range is 100–199 (e.g. MEDIA_UNKNOWN=100).
            try {
                const e = event && event.error;
                const code = e && e.code != null ? Number(e.code) : NaN;
                const cat = e && e.category != null ? Number(e.category) : NaN;
                const det = event && event.detailedErrorCode != null ? Number(event.detailedErrorCode) : NaN;
                return code === 3016 || cat === 3 || (det >= 100 && det <= 199);
            } catch (x) { return false; }
        }
        function reloadWithUrl(url) {
            try {
                let media = (capturedLoadRequest && capturedLoadRequest.media) ||
                            (playerManager.getMediaInformation && playerManager.getMediaInformation());
                if (!media) return false;
                media.contentUrl = url;   // swap to the single-rung playlist; keep contentType/hlsSegmentFormat/customData
                media.contentId = url;
                const req = new cast.framework.messages.LoadRequestData();
                req.media = media;
                req.autoplay = true;
                req.currentTime = 0;
                playerManager.load(req);
                return true;
            } catch (e) { logError('rung reload failed: ' + e); return false; }
        }

        playerManager.addEventListener(cast.framework.events.EventType.ERROR, (event) => {
            castDebugLogger.error('Reboot', 'player error: ' + JSON.stringify(event));
            // TEMP (905 probe): surface the failure with CAF/Shaka detail. 905 = LOAD_INTERRUPTED,
            // 906 = LOAD_FAILED; event.error (Shaka) carries category (1=NETWORK 4=MANIFEST …, incl. CORS
            // as 1002 HTTP_ERROR) + code + data.
            const code = event.detailedErrorCode != null ? event.detailedErrorCode : '?';
            let extra = '';
            try {
                const e = event.error;
                if (e && typeof e === 'object') {
                    const cat = e.category != null ? 'cat=' + e.category + ' ' : '';
                    const ec = e.code != null ? 'shaka=' + e.code + ' ' : '';
                    const data = e.data ? JSON.stringify(e.data).slice(0, 160) : JSON.stringify(e).slice(0, 160);
                    extra = cat + ec + data;
                } else if (event.reason != null) {
                    extra = 'reason=' + event.reason;
                }
            } catch (x) {}
            diag('ERROR code=' + code + (extra ? '\n  ' + extra : ''));
            logError('media error  code=' + code + (extra ? '  ' + extra : ''));
            // Decode-error fallback: swap to a LOWER single-rung playlist and reload. GATED on decode
            // errors only (review §2.1) — stepping resolution can't fix a network/CORS failure, and an
            // ungated fallback would swap the test-pattern streams in for a CORS-broken workout. The
            // reload is generation-guarded (review §2.8): a sender LOAD/STOP issued meanwhile wins.
            const failedH = (forcedRungHeight != null) ? forcedRungHeight : (lastActiveHeightNum || 1920);
            const next = RUNGS_DESC.filter(r => r.h < failedH)[0] || null;   // descending → [0] = tallest below failedH
            logError('decode=' + isDecodeError(event) + ' ACTIVE=' + lastActiveWxH + ' failedH=' + failedH + ' next=' + (next ? next.h : 'none') + ' fb=' + fallbackAttempts);
            if (isDecodeError(event) && next && fallbackAttempts < MAX_FALLBACK_ATTEMPTS) {
                fallbackAttempts++;
                forcedRungHeight = next.h;
                const gen = loadGeneration;
                logError('FALLBACK #' + fallbackAttempts + ': force ' + next.h + ' → ' + next.url);
                // Reload after a tick so the fatal error fully unwinds first. If the reload can't be issued,
                // surface the error instead of hanging silently.
                fallbackTimer = setTimeout(() => {
                    fallbackTimer = null;
                    if (gen !== loadGeneration) { logError('fallback #' + fallbackAttempts + ' cancelled (newer load/stop)'); return; }
                    pendingInternalReload = true;
                    if (!reloadWithUrl(next.url)) {
                        pendingInternalReload = false;
                        showError('Playback error', 'The workout video failed to load on the TV.', 'code=' + code + (extra ? '  ·  ' + extra : ''));
                    }
                }, 60);
                return;   // retrying a shorter rung — suppress the fullscreen error for now
            }
            showError('Playback error', 'The workout video failed to load on the TV.', 'code=' + code + (extra ? '  ·  ' + extra : ''));
        });

        // TEMP (MA-4513 error-905 probe): the Back/Home auto-stop (visibilitychange / pagehide →
        // context.stop()) is DISABLED while the CDN CORS issue is open. Restore a smarter version
        // (guarded so it can't fire during the initial load) once casting works end to end.
        //
        // let exitStopTimer = null;
        // document.addEventListener('visibilitychange', () => {
        //     if (document.hidden && hasLoaded) {
        //         exitStopTimer = setTimeout(() => { try { context.stop(); } catch (e) {} }, 1500);
        //     } else if (exitStopTimer) { clearTimeout(exitStopTimer); exitStopTimer = null; }
        // });
        // window.addEventListener('pagehide', () => { if (hasLoaded) { try { context.stop(); } catch (e) {} } });

        // Hard scroll-lock: the TV system overlay / focus changes can scroll the document and leave the
        // whole UI shifted up. All layers are position:fixed (immune to the WebView window resize the
        // overlay triggers), and this snaps any stray scroll back to the top. (MA-4513)
        const resetScroll = () => { if (window.scrollY || window.scrollX) window.scrollTo(0, 0); };
        window.addEventListener('scroll', resetScroll, { passive: true });
        window.addEventListener('resize', resetScroll);

        // Crash feedback: any uncaught JS error or unhandled promise rejection (Shaka async failures often
        // land here) is surfaced in the on-screen error feed instead of dying silently in the console.
        window.addEventListener('error', (e) => {
            const where = e.filename ? ' @' + String(e.filename).split('/').pop() + ':' + e.lineno : '';
            logError('JS error  ' + (e.message || 'error') + where);
        });
        window.addEventListener('unhandledrejection', (e) => {
            const r = e.reason;
            const msg = (r && r.message) ? r.message : String(r);
            logError('unhandled promise  ' + msg.slice(0, 200));
        });

        // TEMP (MA-4513 error-905 probe): observe the transport commands the SENDER issues. An interceptor
        // MUST return the (unchanged) request or the command is dropped — these only log + pass through.
        const MsgType = cast.framework.messages.MessageType;
        let loadCount = 0;
        playerManager.setMessageInterceptor(MsgType.LOAD, (req) => {
            loadCount++;
            const isInternalReload = pendingInternalReload;
            pendingInternalReload = false;
            if (!isInternalReload) {
                // A fresh SENDER load: reset the fallback ladder state and cancel any pending retry —
                // otherwise a second cast in the same session inherits exhausted attempts / a stale
                // forced height, and a pending retry timer could clobber this newer load (review §2.5).
                loadGeneration++;
                if (fallbackTimer) { clearTimeout(fallbackTimer); fallbackTimer = null; }
                fallbackAttempts = 0;
                forcedRungHeight = null;
            }
            capturedLoadRequest = req;   // keep the request so the decode-fallback can reload without getMediaInformation()
            // A fresh load attempt (incl. a retry): clear any prior error and arm the playback watchdog.
            awaitingPlayback = true; loadStartedAt = Date.now(); hideError();
            let url = '(none)';
            try { url = (req && req.media && (req.media.contentUrl || req.media.contentId)) || '(none)'; } catch (e) {}
            lastLoadedUrl = url;   // captured on LOAD (fires even if playback later fails) → shown in the error context
            const at = (req && req.currentTime != null) ? Math.round(req.currentTime) : 0;
            diag('LOAD #' + loadCount + ' start@' + at + 's\n  ' + url);
            // Paint the blurred cover NOW, from the LOAD request's customData — it's paint-only (no CORS)
            // and shouldn't wait for PLAYER_LOAD_COMPLETE (which never fires if the video fails to load).
            // So the frosted background appears the instant the cast loads, even before/without playback.
            try {
                const cd = req && req.media && req.media.customData;
                if (cd) {
                    if (cd.cover) applyCover(cd.cover);
                    if (cd.audio) desiredAudioLabel = cd.audio;
                }
            } catch (e) {}
            return req;
        });
        playerManager.setMessageInterceptor(MsgType.STOP, (req) => {
            diag('>> STOP received');
            // A sender STOP outranks any pending fallback retry (review §2.8).
            loadGeneration++;
            if (fallbackTimer) { clearTimeout(fallbackTimer); fallbackTimer = null; }
            return req;
        });
        playerManager.setMessageInterceptor(MsgType.SEEK, (req) => {
            const at = (req && req.currentTime != null) ? Math.round(req.currentTime) : '?';
            diag('>> SEEK ' + at + 's'); return req;
        });
        playerManager.setMessageInterceptor(MsgType.PAUSE, (req) => { diag('>> PAUSE'); return req; });

        // NOTE (MA-4513 M4, abandoned): TV-remote next/prev via the D-pad is NOT possible on a Web
        // Receiver — Android TV translates remote input into media-playback messages, not raw D-pad key
        // events, and CAF does not map the D-pad to QUEUE_NEXT/PREV. The advertise + QUEUE_UPDATE
        // interceptor that lived here were removed. Real D-pad control needs a native Android TV receiver
        // / Cast Connect. The phone stays the primary controller.

        // ── MA-4513: device-tiered rendition selection (portrait frame-height limit) ─────────────
        // Our workout HLS is PORTRAIT. A 1080p-class Cast decoder (e.g. an LG Chromecast-built-in TV)
        // caps the decodable frame HEIGHT at ~1088 and rejects taller portrait rungs with Shaka 3016
        // (PIPELINE_ERROR_COULD_NOT_RENDER); a 4K-class Cast target (Chromecast with Google TV / Google
        // TV Streamer) decodes the full portrait. PROVEN with same-size-only test streams (plan §6.6).
        //
        // Probe each PORTRAIT rung with canDisplayType and cap Shaka's ABR to maxHeight = the tallest one
        // the device claims it can display, applied per-load via setMediaPlaybackInfoHandler (runs just
        // BEFORE player creation, so ABR never briefly picks an undecodable rung). ABR then auto-selects
        // the best DECODABLE rung and falls back to the lowest on a capped device — no more 3016.
        // (Requires a ladder that HAS a <=1080-tall rung; our test master does, the real workout manifest
        // does NOT yet — backend must add one, §6.6.)
        // NOTE (v0.0.33): a landscape 4K probe was tried first (v0.0.31) and MISFIRED — a 4K PANEL makes
        // canDisplayType(3840x2160)=Y regardless of the Cast decoder's real portrait-height limit. If the
        // direct portrait probe ALSO ignores the height limit (visible in #resinfo), fall back to reacting
        // to the actual decode ERROR (step the cap below the failed rung + reload).
        let tierProbe = '(probe pending)';
        let maxDecodableHeight = null;   // computed lazily on the first load (after context.start)
        // §6 Step 0 probes (review doc): the on-screen signals for the verification session.
        let envProbe = '(env pending)';         // CAF/Shaka versions + getDeviceInformation availability
        let cfgProbe = '(cfg pending)';         // what the LIVE shaka instance really has configured
        let lastManifestReqTail = '—';          // tail of the last fetched manifest URL = which rung loaded
        let manifestHandlerSeen = '';           // whether manifestHandler fired (master✓ / media✓)
        let envLogged = false;
        function computeMaxDecodableHeight() {
            const H264 = 'avc1.640028';   // High@4.0 — matches our test ladder
            const canDisplay = (w, h) => { try { return !!context.canDisplayType('video/mp4', H264, w, h, 30); } catch (e) { return false; } };
            // Drive the cap off DIRECT PORTRAIT probes — the tallest portrait rung this device claims it can
            // display. (v0.0.31 drove it off a landscape 4K probe and MISFIRED on the LG: its 4K PANEL makes
            // canDisplayType(3840x2160)=Y even though the Cast H.264 decode path can't render a >~1088-tall
            // portrait frame → the device was mis-tiered as 4K, no cap applied, 3016 again.)
            const portrait = [[608, 1080], [720, 1280], [1080, 1920]];
            let maxH = 0;
            const portraitStr = portrait.map(r => {
                const ok = canDisplay(r[0], r[1]);
                if (ok && r[1] > maxH) maxH = r[1];
                return r[0] + '×' + r[1] + '=' + (ok ? 'Y' : 'N');
            }).join(' ');
            if (maxH === 0) maxH = 1080;   // floor: always keep the lowest rung so we never filter to zero variants
            // Landscape probes kept for DIAGNOSIS only — shows whether canDisplayType reflects the 4K PANEL
            // (returns Y) vs the actual decoder (should return N on a 1080p-class Cast path):
            const land = 'land 4k=' + (canDisplay(3840, 2160) ? 'Y' : 'N') + ' 1080=' + (canDisplay(1920, 1080) ? 'Y' : 'N');
            tierProbe = land + '  port ' + portraitStr + '  →cap≤' + maxH;
            diag('decode tier: ' + tierProbe);
            return maxH;
        }
        // TEMP toggles for the review doc §6 Step 0/1 verification session. Each candidate mechanism is
        // applied only when its toggle is non-zero so the experiments stay isolated. Switching = flip a
        // toggle + bump #version + redeploy (session part A = abr restrictions, part B = manifest filter).
        // Part A result (LG, v0.0.39, 2026-07-02): abr.restrictions.maxHeight=1080 CONFIRMED on the live
        // instance (cfg: abr.maxH=1080) yet ABR still picked 1080×1920 → 3016. Genuinely inert on this
        // runtime (CAF 3.0.0137, shaka v4.9.2-caf2 fork) — candidate 1 is dead; toggle left off.
        const TEST_ABR_RESTRICTIONS_MAX_HEIGHT = 0;      // candidate 1 (§3.2 re-test): DEAD, see above
        const TEST_MANIFEST_FILTER_MAX_HEIGHT = 1080;    // candidate 2 (§3.4): master-playlist text filter — Part B

        // Strips #EXT-X-STREAM-INF (and #EXT-X-I-FRAME-STREAM-INF) variants taller than `cap` from a
        // MASTER playlist text. Every #EXT-X-MEDIA line survives — the audio renditions must never be
        // dropped (review §2.2). Fail-open: on anything unexpected, or if filtering would leave zero
        // variants, return the original text so playback degrades to the unfiltered ladder, not a crash.
        function filterMasterByHeight(text, cap) {
            try {
                const lines = text.split('\n');
                const out = [];
                let kept = 0;
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    const isIFrame = line.indexOf('#EXT-X-I-FRAME-STREAM-INF') === 0;
                    const isVariant = !isIFrame && line.indexOf('#EXT-X-STREAM-INF') === 0;
                    const res = (isIFrame || isVariant) ? line.match(/RESOLUTION=(\d+)x(\d+)/) : null;
                    if (res && Number(res[2]) > cap) {
                        if (isVariant) i++;   // also skip the variant's URI line (the next line per HLS spec)
                        continue;
                    }
                    if (isVariant && res) kept++;
                    out.push(line);
                }
                return kept > 0 ? out.join('\n') : text;
            } catch (e) { logError('master filter failed: ' + e); return text; }
        }

        playerManager.setMediaPlaybackInfoHandler((loadRequestData, playbackConfig) => {
            try {
                // canDisplayType probe is DISPLAY-ONLY now (proven a liar for tiering, plan §6.6.1); it no
                // longer feeds shakaConfig — the Step 0 toggles above drive the actual experiments.
                if (maxDecodableHeight === null) maxDecodableHeight = computeMaxDecodableHeight();
                if (TEST_ABR_RESTRICTIONS_MAX_HEIGHT > 0) {
                    const shakaConfig = Object.assign({}, playbackConfig.shakaConfig);
                    shakaConfig.abr = Object.assign({}, shakaConfig.abr, {
                        restrictions: Object.assign({}, (shakaConfig.abr || {}).restrictions, {
                            maxHeight: TEST_ABR_RESTRICTIONS_MAX_HEIGHT,
                        }),
                    });
                    playbackConfig.shakaConfig = shakaConfig;
                    diag('MPI: set abr.restrictions.maxHeight=' + TEST_ABR_RESTRICTIONS_MAX_HEIGHT);
                }
                // Objective "which rung actually loaded" signal (§3.2): log every manifest fetch.
                playbackConfig.manifestRequestHandler = (requestInfo) => {
                    try {
                        lastManifestReqTail = String(requestInfo.url).split('/').slice(-2).join('/');
                        diag('MANIFEST req: ' + lastManifestReqTail);
                    } catch (e) {}
                };
                // Does manifestHandler fire at all under useShakaForHls (+ optional master filtering)?
                playbackConfig.manifestHandler = (manifest) => {
                    try {
                        const text = String(manifest);
                        const isMaster = text.indexOf('#EXT-X-STREAM-INF') !== -1;
                        manifestHandlerSeen = isMaster ? 'master✓' : (manifestHandlerSeen || 'media✓');
                        if (isMaster && TEST_MANIFEST_FILTER_MAX_HEIGHT > 0) {
                            diag('manifestHandler: filtering master to ≤' + TEST_MANIFEST_FILTER_MAX_HEIGHT);
                            return filterMasterByHeight(text, TEST_MANIFEST_FILTER_MAX_HEIGHT);
                        }
                    } catch (e) { logError('manifestHandler failed: ' + e); }
                    return manifest;
                };
            } catch (e) { logError('MPI handler failed: ' + e); }
            return playbackConfig;
        });

        const options = new cast.framework.CastReceiverOptions();
        // useShakaForHls=true is REQUIRED for our TS HLS. Diagnostic v0.0.24 tried native/MPL
        // (useShakaForHls=false) and it REGRESSED (CAF 411 HLS_MANIFEST_MASTER → 905 on the dongle,
        // JS/script-error + 15s load-timeout on LG). The LG 3016 was later PROVEN to be a decoder
        // max-HEIGHT limit on portrait, not a container issue (the fMP4 theory was disproven — both we and
        // Harna serve TS); handled by the device-tiered maxHeight cap above (§6/§6.6).
        options.useShakaForHls = true;
        context.start(options);
    </script>
</body>
</html>
